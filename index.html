<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept ERP PRO MAX</title>

<style>
:root{--main:#5fa38c;--bg:#f3f7f6;--card:#fff;--soft:#eaf5f1;--text:#1f2933;--danger:#dc2626}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:#0f172a;color:white;padding:14px;font-weight:800}
.container{max-width:1200px;margin:auto;padding:16px}
.card{background:var(--card);padding:16px;border-radius:18px;margin:14px 0;box-shadow:0 8px 22px rgba(0,0,0,.12)}
.row{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:6px 0}
button,input,select{padding:8px;border-radius:10px;border:1px solid #ccc;width:100%;margin:4px}
button{background:var(--main);color:white;font-weight:700;border:none}
</style>
</head>

<body>
<header>House Concept ERP PRO MAX</header>
<div class="container">

<div class="card">
<h3>📊 Raport miesięczny</h3>
<select id="reportMonth"></select>
<div id="reportTable"></div>
</div>

<div class="card">
<h3>⏰ Przypomnienia wypłat</h3>
<select id="remMode">
<option value="monthly">Co miesiąc</option>
<option value="weekly">Co tydzień</option>
</select>
<input id="remHour" type="number" placeholder="Godzina (0-23)">
<button onclick="saveReminder()">Zapisz</button>
<div id="remStatus"></div>
</div>

<div class="card">
<h3>📈 Analityka</h3>
<div id="analytics"></div>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("ERP_COMPLETE_PLUS"))||{
workers:[],projects:[],entries:[],advances:[]
};

let reminder=JSON.parse(localStorage.getItem("REMINDER"))||{
mode:"monthly",hour:17,last:null
};

const saveReminder=()=>{
reminder.mode=remMode.value;
reminder.hour=+remHour.value;
localStorage.setItem("REMINDER",JSON.stringify(reminder));
remStatus.textContent="Zapisano ✔";
};

function buildMonthList(){
let set=new Set(db.entries.map(e=>e.date.slice(0,7)));
reportMonth.innerHTML=[...set].map(m=>`<option>${m}</option>`).join("");
}

function report(){
let m=reportMonth.value;
let html="<div class='row'><b>Pracownik</b><b>Zarobione</b><b>Zaliczki</b><b>Do wypłaty</b></div>";
db.workers.forEach(w=>{
let earned=db.entries.filter(e=>e.worker===w.id && e.date.startsWith(m))
.reduce((s,e)=>s+e.hours*w.rate,0);
let adv=db.advances.filter(a=>a.worker===w.id && a.date.startsWith(m))
.reduce((s,a)=>s+a.amount,0);
html+=`<div class='row'><span>${w.name}</span><span>${earned}</span><span>${adv}</span><span>${earned-adv}</span></div>`;
});
reportTable.innerHTML=html;
}

reportMonth.onchange=report;

function analytics(){
let totalEarned=0,totalAdv=0,totalHours=0;
db.entries.forEach(e=>{
let w=db.workers.find(x=>x.id===e.worker);
totalEarned+=e.hours*w.rate;
totalHours+=e.hours;
});
db.advances.forEach(a=>totalAdv+=a.amount);

analytics.innerHTML=`
<div class="row">Godziny łącznie: ${totalHours}</div>
<div class="row">Zarobione: ${totalEarned} zł</div>
<div class="row">Zaliczki: ${totalAdv} zł</div>
<div class="row"><b>Do wypłaty: ${totalEarned-totalAdv} zł</b></div>
`;
}

function reminderCheck(){
let now=new Date();
if(now.getHours()!==reminder.hour) return;

let today=now.toDateString();
if(reminder.last===today) return;

if(reminder.mode==="weekly" && now.getDay()!==1) return;

alert("💸 Przypomnienie: sprawdź wypłaty w ERP");

reminder.last=today;
localStorage.setItem("REMINDER",JSON.stringify(reminder));
}

setInterval(reminderCheck,60000);

buildMonthList();
report();
analytics();
</script>
</body>
</html>
