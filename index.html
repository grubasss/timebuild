<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TimeBuild Pro ERP</title>

<style>
:root{
--main:#6faf8e;
--dark:#0f172a;
--bg:#f3f4f6;
--card:#fff;
--border:#e5e7eb;
}

body{margin:0;font-family:system-ui;background:var(--bg)}
header{background:var(--dark);color:white;padding:18px;font-size:22px}

.container{max-width:1400px;margin:auto;padding:16px}

.card{
background:white;
padding:18px;
border-radius:16px;
margin:16px 0;
box-shadow:0 6px 16px rgba(0,0,0,.08)
}

.calendar-wrap{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px
}

.weekday{
font-weight:700;
text-align:center;
padding:6px
}

.day{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,.05);
}

.day.today{
background:#dcfce7;
font-weight:700
}

.day.active{
outline:3px solid var(--main)
}

.day.empty{
background:transparent;
box-shadow:none;
cursor:default
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
padding:6px 0
}

button,input,select{
padding:8px;
border-radius:10px;
border:1px solid var(--border);
margin:4px;
width:100%
}

button{
background:var(--main);
color:white;
border:none;
font-weight:600
}

.flex{
display:flex;
gap:6px;
flex-wrap:wrap
}

.small{width:90px}

.remove{
color:#dc2626;
cursor:pointer;
font-weight:700
}
</style>
</head>

<body>
<header>TimeBuild Pro — ERP</header>
<div class="container">

<div class="card">
<div class="calendar-wrap" id="weekdays"></div>
<div class="calendar-wrap" id="calendar"></div>
</div>

<div class="card">
<select id="worker"></select>
<select id="project"></select>
<input id="hours" type="number" placeholder="Godziny">

<div class="flex">
<button onclick="addEntry(false)">Jednemu</button>
<button onclick="addEntry(true)">Wszystkim</button>
</div>

<div id="dayList"></div>
<button onclick="deleteDay()" style="background:#dc2626">Usuń dzień</button>
</div>

<div class="card">
<h3>👷 Pracownicy</h3>
<input id="newWorker" placeholder="Imię i nazwisko">
<input id="newRate" type="number" placeholder="Stawka">
<button onclick="addWorker()">Dodaj</button>
<div id="workers"></div>
</div>

<div class="card">
<h3>📁 Projekty</h3>
<input id="newProject" placeholder="Projekt">
<button onclick="addProject()">Dodaj</button>
<div id="projects"></div>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("TBPRO"))||{
workers:[],
projects:[],
entries:{}
};

let selected=null;
const save=()=>localStorage.setItem("TBPRO",JSON.stringify(db));
const key=d=>d.toISOString().slice(0,10);

const weekdays=["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];
weekdays.forEach(d=>weekdaysEl=document.getElementById("weekdays").innerHTML+=`<div class="weekday">${d}</div>`);

function buildCalendar(){
calendar.innerHTML="";
let now=new Date();
let y=now.getFullYear();
let m=now.getMonth();

let first=new Date(y,m,1);
let start=(first.getDay()+6)%7;
let days=new Date(y,m+1,0).getDate();
let todayKey=key(new Date());

for(let i=0;i<start;i++){
calendar.innerHTML+=`<div class="day empty"></div>`;
}

for(let i=1;i<=days;i++){
let d=new Date(y,m,i);
let k=key(d);
let sum=(db.entries[k]||[]).reduce((a,b)=>a+b.h,0);

let cls="day";
if(k===todayKey) cls+=" today";
if(k===selected) cls+=" active";

calendar.innerHTML+=`
<div class="${cls}" onclick="selectDay('${k}')">
${i}<br>${sum||""}
</div>`;
}
}

function selectDay(k){
selected=k;
render();
}

function addEntry(all){
if(!selected||!hours.value) return;
db.entries[selected]=db.entries[selected]||[];
if(all){
db.workers.forEach((_,i)=>{
db.entries[selected].push({w:i,p:project.value,h:+hours.value});
});
}else{
db.entries[selected].push({w:+worker.value,p:project.value,h:+hours.value});
}
hours.value="";
save();render();
}

function deleteDay(){
delete db.entries[selected];
save();render();
}

function addWorker(){
db.workers.push({name:newWorker.value,rate:+newRate.value});
newWorker.value="";newRate.value="";
save();render();
}

function addProject(){
db.projects.push(newProject.value);
newProject.value="";
save();render();
}

function render(){
buildCalendar();

worker.innerHTML="";
project.innerHTML="";
workers.innerHTML="";
projects.innerHTML="";
dayList.innerHTML="";

db.workers.forEach((w,i)=>{
worker.innerHTML+=`<option value="${i}">${w.name}</option>`;
workers.innerHTML+=`
<div class="row">
<input value="${w.name}" onchange="db.workers[${i}].name=this.value;save()">
<input class="small" type="number" value="${w.rate}" onchange="db.workers[${i}].rate=+this.value;save()">
<span class="remove" onclick="db.workers.splice(${i},1);save();render()">✖</span>
</div>`;
});

db.projects.forEach((p,i)=>{
project.innerHTML+=`<option>${p}</option>`;
projects.innerHTML+=`
<div class="row">
<input value="${p}" onchange="db.projects[${i}]=this.value;save()">
<span class="remove" onclick="db.projects.splice(${i},1);save();render()">✖</span>
</div>`;
});

(db.entries[selected]||[]).forEach((e,i)=>{
dayList.innerHTML+=`
<div class="row">
${db.workers[e.w]?.name} – ${e.p}
<input class="small" value="${e.h}" onchange="db.entries[selected][${i}].h=+this.value;save();render()">h
<span class="remove" onclick="db.entries[selected].splice(${i},1);save();render()">✖</span>
</div>`;
});
}

render();
</script>
</body>
</html>
