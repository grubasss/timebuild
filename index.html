<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild PRO+ ERP</title>

<style>
body{margin:0;font-family:system-ui;background:#f3f4f6}
header{background:#0f172a;color:white;padding:18px;font-size:22px}
.container{max-width:1400px;margin:auto;padding:16px}
.card{background:white;padding:18px;border-radius:16px;margin:16px 0;box-shadow:0 6px 16px rgba(0,0,0,.08)}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.weekday{text-align:center;font-weight:700}
.day{background:white;padding:12px;border-radius:12px;text-align:center;cursor:pointer}
.day.today{background:#dcfce7;font-weight:700}
.day.active{outline:3px solid #6faf8e}
.day.empty{background:transparent}
.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:6px}
button,input,select{padding:8px;border-radius:10px;border:1px solid #ddd;margin:4px;width:100%}
button{background:#6faf8e;color:white;font-weight:600;border:none}
.flex{display:flex;gap:6px;flex-wrap:wrap}
.small{width:90px}
.remove{color:#dc2626;font-weight:700;cursor:pointer}
.stat{font-size:18px;font-weight:700}
.badge{background:#e5e7eb;padding:3px 8px;border-radius:6px;font-size:12px}
</style>
</head>

<body>
<header>TimeBuild PRO+ ERP</header>
<div class="container">

<div class="card flex">
<div>Dziś: <span id="kToday" class="stat">0</span> zł</div>
<div>Tydzień: <span id="kWeek" class="stat">0</span> zł</div>
<div>Miesiąc: <span id="kMonth" class="stat">0</span> zł</div>
<div>Do wypłaty: <span id="kPay" class="stat">0</span> zł</div>
</div>

<div class="card">
<div id="weekdays" class="calendar"></div>
<div id="calendar" class="calendar"></div>
</div>

<div class="card">
<select id="worker"></select>
<select id="project"></select>
<input id="hours" type="number" placeholder="Godziny">
<div class="flex">
<button onclick="addEntry(false)">Jednemu</button>
<button onclick="addEntry(true)">Wszystkim</button>
</div>
<div id="dayList"></div>
<button onclick="deleteDay()" style="background:#dc2626">Usuń dzień</button>
</div>

<div class="card">
<h3>👷 Pracownicy</h3>
<input id="newWorker" placeholder="Imię i nazwisko">
<input id="newRate" type="number" placeholder="Stawka">
<button onclick="addWorker()">Dodaj</button>
<div id="workers"></div>
</div>

<div class="card">
<h3>📁 Projekty</h3>
<input id="newProject" placeholder="Projekt">
<button onclick="addProject()">Dodaj</button>
<div id="projects"></div>
</div>

<div class="card">
<h3>💸 Zaliczki</h3>
<select id="advWorker"></select>
<input id="advAmount" type="number" placeholder="Kwota">
<button onclick="addAdvance()">Dodaj</button>
<div id="advances"></div>
</div>

<div class="card">
<h3>📊 Rozliczenia PRO</h3>
<div id="summary"></div>
</div>

<div class="card">
<h3>📈 KPI firmy</h3>
<div id="kpi"></div>
</div>

<div class="card">
<h3>💰 Cashflow</h3>
<div id="cashflow"></div>
</div>

<script>
let db=JSON.parse(localStorage.getItem("TBPRO"))||{
workers:[],
projects:[],
entries:{}
};

const save=()=>localStorage.setItem("TBPRO",JSON.stringify(db));
const key=d=>d.toISOString().slice(0,10);
let selected=null;

const days=["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];
weekdays.innerHTML=days.map(d=>`<div class="weekday">${d}</div>`).join("");

function buildCalendar(){
calendar.innerHTML="";
let now=new Date();
let y=now.getFullYear(),m=now.getMonth();
let first=new Date(y,m,1);
let start=(first.getDay()+6)%7;
let count=new Date(y,m+1,0).getDate();
let todayKey=key(new Date());

for(let i=0;i<start;i++) calendar.innerHTML+=`<div class="day empty"></div>`;

for(let i=1;i<=count;i++){
let d=new Date(y,m,i),k=key(d);
let sum=(db.entries[k]||[]).reduce((a,b)=>a+b.h,0);
let cls="day"+(k===todayKey?" today":"")+(k===selected?" active":"");
calendar.innerHTML+=`<div class="${cls}" onclick="selectDay('${k}')">${i}<br>${sum||""}</div>`;
}
}

function selectDay(k){selected=k;render();}

function addEntry(all){
if(!selected||!hours.value) return;
db.entries[selected]=db.entries[selected]||[];
if(all){
db.workers.forEach((_,i)=>db.entries[selected].push({w:i,p:project.value,h:+hours.value}));
}else{
db.entries[selected].push({w:+worker.value,p:project.value,h:+hours.value});
}
hours.value="";save();render();
}

function deleteDay(){delete db.entries[selected];save();render();}

function addWorker(){
db.workers.push({name:newWorker.value,rate:+newRate.value||0,adv:[]});
newWorker.value="";newRate.value="";
save();render();
}

function addProject(){
db.projects.push(newProject.value);
newProject.value="";
save();render();
}

function addAdvance(){
let w=db.workers[advWorker.value];
w.adv.push({date:new Date().toLocaleString("pl-PL"),amount:+advAmount.value});
advAmount.value="";
save();render();
}

function render(){
buildCalendar();
worker.innerHTML="";
project.innerHTML="";
advWorker.innerHTML="";
workers.innerHTML="";
projects.innerHTML="";
dayList.innerHTML="";
advances.innerHTML="";
summary.innerHTML="";

let todayKey=key(new Date());
let weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay());
let monthKey=todayKey.slice(0,7);

let kToday=0,kWeek=0,kMonth=0,kPay=0,totalCost=0;

db.workers.forEach((w,i)=>{
worker.innerHTML+=`<option value="${i}">${w.name}</option>`;
advWorker.innerHTML+=`<option value="${i}">${w.name}</option>`;

workers.innerHTML+=`
<div class="row">
<input value="${w.name}" onchange="w.name=this.value;save()">
<input class="small" value="${w.rate}" onchange="w.rate=+this.value;save()">
<span class="remove" onclick="db.workers.splice(${i},1);save();render()">✖</span>
</div>`;
});

db.projects.forEach((p,i)=>{
project.innerHTML+=`<option>${p}</option>`;
projects.innerHTML+=`
<div class="row">
<input value="${p}" onchange="db.projects[${i}]=this.value;save()">
<span class="remove" onclick="db.projects.splice(${i},1);save();render()">✖</span>
</div>`;
});

(db.entries[selected]||[]).forEach((e,i)=>{
dayList.innerHTML+=`
<div class="row">
${db.workers[e.w]?.name} – ${e.p}
<input class="small" value="${e.h}" onchange="db.entries[selected][${i}].h=+this.value;save();render()">h
<span class="remove" onclick="db.entries[selected].splice(${i},1);save();render()">✖</span>
</div>`;
});

db.workers.forEach((w,i)=>{
let total=0,week=0,month=0;
Object.entries(db.entries).forEach(([d,arr])=>{
arr.forEach(e=>{
if(e.w===i){
let cost=e.h*w.rate;
total+=cost;
totalCost+=cost;
if(d===todayKey) kToday+=cost;
if(new Date(d)>=weekStart){week+=cost;kWeek+=cost;}
if(d.startsWith(monthKey)){month+=cost;kMonth+=cost;}
}
});
});
let adv=w.adv.reduce((s,a)=>s+a.amount,0);
kPay+=total-adv;

summary.innerHTML+=`
<div class="card">
<b>${w.name}</b><br>
Tydzień: ${week} zł<br>
Miesiąc: ${month} zł<br>
Razem: ${total} zł<br>
Zaliczki: ${adv} zł<br>
<b>Do wypłaty: ${total-adv} zł</b>
</div>`;

w.adv.forEach((a,ai)=>{
advances.innerHTML+=`
<div class="row">
${w.name} — ${a.date}
<input class="small" value="${a.amount}" onchange="w.adv[${ai}].amount=+this.value;save();render()">
<span class="remove" onclick="w.adv.splice(${ai},1);save();render()">✖</span>
</div>`;
});
});

kTodayEl=kToday;kWeekEl=kWeek;kMonthEl=kMonth;kPayEl=kPay;

document.getElementById("kToday").textContent=kToday;
document.getElementById("kWeek").textContent=kWeek;
document.getElementById("kMonth").textContent=kMonth;
document.getElementById("kPay").textContent=kPay;

let daysWorked=new Set(Object.keys(db.entries));
let avgDaily=daysWorked.size?Math.round(totalCost/daysWorked.size):0;
let dayNow=new Date().getDate();
let daysMonth=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
let forecast=Math.round((totalCost/dayNow)*daysMonth);

kpi.innerHTML=`Średnio dziennie: <b>${avgDaily} zł</b><br>Prognoza miesiąca: <b>${forecast} zł</b>`;
cashflow.innerHTML=`Koszty: <b>${totalCost} zł</b> | Wypłaty realne: <b>${kPay} zł</b>`;
}

render();
</script>
</body>
</html>
