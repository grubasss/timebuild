<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TimeBuild ERP 5.1 PRO</title>
<style>
body{margin:0;font-family:system-ui;background:#f3f4f6}
header{background:#0f172a;color:white;padding:16px;font-size:22px}
.container{max-width:1300px;margin:auto;padding:16px}
.card{background:white;padding:16px;border-radius:14px;margin:14px 0;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.weekday{text-align:center;font-weight:700}
.day{background:white;border-radius:12px;padding:10px;text-align:center;cursor:pointer}
.day.today{background:#dcfce7;font-weight:700}
.day.active{outline:3px solid #6faf8e}
.day.empty{background:transparent}
.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:6px}
button,input,select{padding:8px;border-radius:10px;border:1px solid #ddd;width:100%;margin:4px}
button{background:#6faf8e;color:white;border:none;font-weight:600}
.flex{display:flex;gap:6px;flex-wrap:wrap}
.small{width:90px}
.remove{color:#dc2626;font-weight:700;cursor:pointer}
.stat{font-size:18px;font-weight:700}
</style>
</head>

<body>
<header>TimeBuild ERP 5.1 PRO</header>
<div class="container">

<div class="card flex">
<div>Dziś: <span id="todaySum" class="stat">0</span> zł</div>
<div>Tydzień: <span id="weekSum" class="stat">0</span> zł</div>
<div>Miesiąc: <span id="monthSum" class="stat">0</span> zł</div>
<div>Do wypłaty: <span id="paySum" class="stat">0</span> zł</div>
</div>

<div class="card">
<div id="weekdays" class="grid"></div>
<div id="calendar" class="grid"></div>
</div>

<div class="card">
<select id="workerSel"></select>
<select id="projectSel"></select>
<input id="hours" type="number" placeholder="Godziny">

<div class="flex">
<button onclick="addEntry(false)">Jednemu</button>
<button onclick="addEntry(true)">Wszystkim</button>
</div>

<div id="dayEntries"></div>
</div>

<div class="card">
<h3>👷 Pracownicy</h3>
<input id="wName" placeholder="Imię">
<input id="wRate" type="number" placeholder="Stawka">
<button onclick="addWorker()">Dodaj</button>
<div id="workers"></div>
</div>

<div class="card">
<h3>📁 Projekty</h3>
<input id="pName" placeholder="Projekt">
<button onclick="addProject()">Dodaj</button>
<div id="projects"></div>
</div>

<div class="card">
<h3>💸 Zaliczki</h3>
<select id="advWorker"></select>
<input id="advAmount" type="number" placeholder="Kwota">
<button onclick="addAdvance()">Dodaj</button>
<div id="advList"></div>
</div>

<div class="card">
<h3>📊 Rozliczenia</h3>
<div id="reports"></div>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("ERP51")) || {
 workers:[],
 projects:[],
 entries:[],
 advances:[]
};

const save=()=>localStorage.setItem("ERP51",JSON.stringify(db));
const uid=()=>Date.now()+Math.random();

const dateKey = d => {
  const x = new Date(d);
  return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");
};

const days=["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];
weekdays.innerHTML=days.map(d=>`<div class="weekday">${d}</div>`).join("");

let current=new Date();
let selected=null;

function rate(id){return db.workers.find(w=>w.id===id)?.rate||0}

function buildCalendar(){
calendar.innerHTML="";
let y=current.getFullYear(),m=current.getMonth();
let first=new Date(y,m,1);
let start=(first.getDay()+6)%7;
let count=new Date(y,m+1,0).getDate();
let today=dateKey(new Date());

for(let i=0;i<start;i++) calendar.innerHTML+=`<div class="day empty"></div>`;

for(let i=1;i<=count;i++){
let d=new Date(y,m,i);
let k=dateKey(d);

let sum=db.entries.filter(e=>e.date===k)
.reduce((s,e)=>s+e.hours*rate(e.workerId),0);

let cls="day"+(k===today?" today":"")+(k===selected?" active":"");

calendar.innerHTML+=`
<div class="${cls}" onclick="selected='${k}';render()">
${i}<br>${sum||""}
</div>`;
}
}

function addWorker(){
if(!wName.value) return;
db.workers.push({id:uid(),name:wName.value,rate:+wRate.value||0});
wName.value="";wRate.value="";
save();render();
}

function addProject(){
if(!pName.value) return;
db.projects.push({id:uid(),name:pName.value});
pName.value="";
save();render();
}

function addEntry(all){
if(!selected||!hours.value) return;

if(all){
db.workers.forEach(w=>{
db.entries.push({
id:uid(),
date:selected,
workerId:w.id,
projectId:projectSel.value,
hours:+hours.value
});
});
}else{
db.entries.push({
id:uid(),
date:selected,
workerId:workerSel.value,
projectId:projectSel.value,
hours:+hours.value
});
}

hours.value="";
save();render();
}

function addAdvance(){
db.advances.push({
id:uid(),
workerId:advWorker.value,
date:dateKey(new Date()),
amount:+advAmount.value
});
advAmount.value="";
save();render();
}

function render(){
buildCalendar();

workerSel.innerHTML="";
projectSel.innerHTML="";
advWorker.innerHTML="";
workers.innerHTML="";
projects.innerHTML="";
dayEntries.innerHTML="";
advList.innerHTML="";
reports.innerHTML="";

db.workers.forEach(w=>{
workerSel.innerHTML+=`<option value="${w.id}">${w.name}</option>`;
advWorker.innerHTML+=`<option value="${w.id}">${w.name}</option>`;

workers.innerHTML+=`
<div class="row">
<input value="${w.name}" onchange="w.name=this.value;save()">
<input class="small" value="${w.rate}" onchange="w.rate=+this.value;save()">
<span class="remove" onclick="db.workers=db.workers.filter(x=>x.id!=='${w.id}');save();render()">✖</span>
</div>`;
});

db.projects.forEach(p=>{
projectSel.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
projects.innerHTML+=`
<div class="row">
<input value="${p.name}" onchange="p.name=this.value;save()">
<span class="remove" onclick="db.projects=db.projects.filter(x=>x.id!=='${p.id}');save();render()">✖</span>
</div>`;
});

db.entries.filter(e=>e.date===selected).forEach(e=>{
let w=db.workers.find(x=>x.id===e.workerId);
let p=db.projects.find(x=>x.id===e.projectId);
dayEntries.innerHTML+=`
<div class="row">
${w?.name} – ${p?.name}
<input class="small" value="${e.hours}" onchange="e.hours=+this.value;save();render()"> h
<span class="remove" onclick="db.entries=db.entries.filter(x=>x.id!=='${e.id}');save();render()">✖</span>
</div>`;
});

db.advances.forEach(a=>{
let w=db.workers.find(x=>x.id===a.workerId);
advList.innerHTML+=`
<div class="row">
${w?.name} ${a.date}
<input class="small" value="${a.amount}" onchange="a.amount=+this.value;save();render()">
<span class="remove" onclick="db.advances=db.advances.filter(x=>x.id!=='${a.id}');save();render()">✖</span>
</div>`;
});

let today=dateKey(new Date());
let weekStart=new Date();weekStart.setDate(weekStart.getDate()-((weekStart.getDay()+6)%7));
let month=today.slice(0,7);

let t=0,wk=0,mn=0,pay=0;

db.entries.forEach(e=>{
let cost=e.hours*rate(e.workerId);
if(e.date===today) t+=cost;
if(new Date(e.date)>=weekStart) wk+=cost;
if(e.date.startsWith(month)) mn+=cost;
});

db.workers.forEach(w=>{
let earned=db.entries.filter(e=>e.workerId===w.id)
.reduce((s,e)=>s+e.hours*w.rate,0);
let adv=db.advances.filter(a=>a.workerId===w.id)
.reduce((s,a)=>s+a.amount,0);
let due=earned-adv;
pay+=due;

reports.innerHTML+=`
<div class="row">
${w.name}: tydzień/miesiąc → ${due} zł (zaliczki ${adv})
</div>`;
});

todaySum.textContent=t;
weekSum.textContent=wk;
monthSum.textContent=mn;
paySum.textContent=pay;
}

render();
</script>
</body>
</html>
