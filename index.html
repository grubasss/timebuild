<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>House Concept ERP PRO</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
nav{display:flex;background:#222;color:#fff}
nav button{flex:1;padding:12px;border:0;background:#222;color:#fff;cursor:pointer}
nav button:hover{background:#444}
section{display:none;padding:15px}
input,select,button{padding:6px;margin:4px}
table{border-collapse:collapse;width:100%;background:#fff}
td,th{border:1px solid #ccc;padding:6px;text-align:center}
.active{display:block}
</style>
</head>
<body>

<nav>
<button onclick="show('emp')">Pracownicy</button>
<button onclick="show('hours')">Godziny</button>
<button onclick="show('adv')">Zaliczki</button>
<button onclick="show('settle')">Rozliczenia</button>
<button onclick="show('mat')">Materiały</button>
<button onclick="show('notes')">Notatnik</button>
<button onclick="show('backup')">Backup</button>
</nav>

<section id="emp" class="active">
<h2>Pracownicy</h2>
<input id="ename" placeholder="Imię">
<input id="erate" type="number" placeholder="Stawka">
<button onclick="addEmp()">Dodaj</button>
<div id="emplist"></div>
</section>

<section id="hours">
<h2>Godziny</h2>
<input type="date" id="hdate">
<input type="number" id="hval" placeholder="Godziny">
<select id="hemp"></select>
<button onclick="addHours()">Dodaj</button>
<div id="hourslist"></div>
</section>

<section id="adv">
<h2>Zaliczki</h2>
<input type="date" id="adate">
<input type="number" id="aval" placeholder="Kwota">
<select id="aemp"></select>
<button onclick="addAdv()">Dodaj</button>
<div id="advlist"></div>
</section>

<section id="settle">
<h2>Rozliczenia miesięczne</h2>
<input type="month" id="monthpick" onchange="calcSettle()">
<div id="settleview"></div>
</section>

<section id="mat">
<h2>Materiały</h2>
<input id="mname" placeholder="Materiał">
<input id="mqty" type="number" placeholder="Ilość">
<input id="mprice" type="number" placeholder="Cena">
<button onclick="addMat()">Dodaj</button>
<div id="matlist"></div>
</section>

<section id="notes">
<h2>Notatnik</h2>
<textarea id="note" rows="3" style="width:100%"></textarea>
<button onclick="addNote()">Zapisz</button>
<div id="notelist"></div>
</section>

<section id="backup">
<h2>Backup</h2>
<button onclick="exportData()">Eksport danych</button>
<input type="file" onchange="importData(event)">
</section>

<script>
let db = JSON.parse(localStorage.erp||'{"emp":[],"hours":[],"adv":[],"mat":[],"notes":[]}');

function save(){localStorage.erp=JSON.stringify(db)}

function show(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function refresh(){
 let e = db.emp.map((x,i)=>`${x.name} (${x.rate} zł)`).join("<br>");
 document.getElementById("emplist").innerHTML=e;

 let opts=db.emp.map((x,i)=>`<option value="${i}">${x.name}</option>`).join("");
 hemp.innerHTML=opts; aemp.innerHTML=opts;

 hourslist.innerHTML=db.hours.map(h=>`${h.date} ${db.emp[h.emp].name} ${h.val}h`).join("<br>");
 advlist.innerHTML=db.adv.map(a=>`${a.date} ${db.emp[a.emp].name} ${a.val} zł`).join("<br>");
 matlist.innerHTML=db.mat.map(m=>`${m.name} ${m.qty} x ${m.price} = ${m.qty*m.price} zł`).join("<br>");
 notelist.innerHTML=db.notes.join("<br>");
 save();
}

function addEmp(){db.emp.push({name:ename.value,rate:+erate.value});refresh()}
function addHours(){db.hours.push({date:hdate.value,val:+hval.value,emp:+hemp.value});refresh()}
function addAdv(){db.adv.push({date:adate.value,val:+aval.value,emp:+aemp.value});refresh()}
function addMat(){db.mat.push({name:mname.value,qty:+mqty.value,price:+mprice.value});refresh()}
function addNote(){db.notes.push(note.value);note.value="";refresh()}

function calcSettle(){
 let m=monthpick.value;
 let out="";
 db.emp.forEach((e,i)=>{
  let h=db.hours.filter(x=>x.emp==i&&x.date.startsWith(m))
   .reduce((s,x)=>s+x.val,0);
  let pay=h*e.rate;
  let adv=db.adv.filter(x=>x.emp==i&&x.date.startsWith(m))
   .reduce((s,x)=>s+x.val,0);
  out+=`${e.name}: godz ${h} | zarobek ${pay} | zaliczki ${adv} | do wypłaty ${pay-adv} zł<br>`;
 })
 settleview.innerHTML=out;
}

function exportData(){
 const data=JSON.stringify(db,null,2);
 const w=window.open();
 w.document.write("<pre>"+data+"</pre>");
}

function importData(e){
 const r=new FileReader();
 r.onload=()=>{db=JSON.parse(r.result);refresh()}
 r.readAsText(e.target.files[0]);
}

refresh();
</script>
</body>
</html>
