<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild Pro</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body{font-family:system-ui;background:#f4f6f5;margin:0}
header{background:#2f4f4f;color:white;padding:12px;text-align:center}
.container{max-width:1200px;margin:auto;padding:12px}
.card{background:white;padding:12px;border-radius:12px;margin-bottom:12px}
button{padding:8px;border-radius:8px;border:none;background:#6faf8e;color:white}
input,select{padding:8px;border-radius:8px;width:100%;margin:4px 0}
canvas{max-width:100%}
</style>
</head>

<body>
<header>House Concept – TimeBuild Pro</header>

<div class="container">

<div class="card">
<button onclick="exportBackup()">📦 Backup danych</button>
<input type="file" onchange="importBackup(this)">
<button onclick="exportExcel()">📤 Excel</button>
</div>

<div class="card">
<canvas id="projectChart"></canvas>
</div>

<div class="card">
<canvas id="workerChart"></canvas>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("timebuild")) || {
workers:[],
projects:[],
entries:{}
};

function save(){localStorage.setItem("timebuild",JSON.stringify(data))}

// ===== BACKUP =====
function exportBackup(){
const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

function importBackup(input){
const r=new FileReader();
r.onload=()=>{data=JSON.parse(r.result);save();location.reload()};
r.readAsText(input.files[0]);
}

// ===== EXCEL =====
function exportExcel(){
let wb=XLSX.utils.book_new();

let proj={};
Object.values(data.entries).flat().forEach(e=>{
let cost=e.h*data.workers[e.w].rate;
proj[e.p]=(proj[e.p]||0)+cost;
});

let ws=XLSX.utils.json_to_sheet(
Object.entries(proj).map(([p,v])=>({Projekt:p,Kwota:v}))
);

XLSX.utils.book_append_sheet(wb,ws,"Projekty");
XLSX.writeFile(wb,"raport.xlsx");
}

// ===== CHARTS =====
function drawCharts(){
let proj={},workers={};

Object.values(data.entries).flat().forEach(e=>{
let cost=e.h*data.workers[e.w].rate;
proj[e.p]=(proj[e.p]||0)+cost;
workers[data.workers[e.w].name]=(workers[data.workers[e.w].name]||0)+cost;
});

new Chart(projectChart,{
type:"bar",
data:{labels:Object.keys(proj),datasets:[{data:Object.values(proj)}]}
});

new Chart(workerChart,{
type:"pie",
data:{labels:Object.keys(workers),datasets:[{data:Object.values(workers)}]}
});
}

drawCharts();

// ===== PWA =====
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
