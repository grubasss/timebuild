<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept ERP PRO+</title>

<style>
:root{
--main:#5fa38c;
--dark:#0f172a;
--card:#fff;
--soft:#eaf5f1;
--text:#1f2933;
--danger:#dc2626;
}

body{margin:0;font-family:system-ui;background:#f3f7f6;color:var(--text)}
header{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;padding:14px 18px}
.logo{height:42px;background:white;padding:6px;border-radius:12px}
.container{max-width:1200px;margin:auto;padding:16px}

.card{background:white;padding:16px;border-radius:18px;margin:14px 0;box-shadow:0 8px 22px rgba(0,0,0,.1)}

button,input,select{
padding:10px;border-radius:12px;border:1px solid #ccc;width:100%;margin:4px
}
button{background:var(--main);color:white;font-weight:700;border:none}

.row{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:6px 0}
.low{color:var(--danger);font-weight:800}
canvas{width:100%;height:200px}
</style>
</head>

<body>

<header>
<img src="6CBB60BF-B078-44B2-A9D7-17BF53C87CAF.png" class="logo">
<b>House Concept ERP PRO+</b>
</header>

<div class="container">

<div class="card">
<h3>🏗 Projekty</h3>
<input id="pName" placeholder="Projekt">
<button onclick="addProject()">Dodaj</button>
<div id="projects"></div>
</div>

<div class="card">
<h3>👷 Pracownicy</h3>
<input id="wName" placeholder="Imię">
<input id="wRate" type="number" placeholder="Stawka/h">
<button onclick="addWorker()">Dodaj</button>
<div id="workers"></div>
</div>

<div class="card">
<h3>⏱ Rejestr czasu pracy</h3>
<select id="timeWorker"></select>
<select id="timeProject"></select>
<button onclick="startWork()">Start</button>
<button onclick="stopWork()">Stop</button>
<div id="timeLog"></div>
</div>

<div class="card">
<h3>📦 Magazyn (alert &lt;5)</h3>
<input id="mName" placeholder="Materiał">
<input id="mQty" type="number" placeholder="Ilość">
<input id="mCost" type="number" placeholder="Cena/szt">
<button onclick="addMaterial()">Dodaj</button>
<div id="materials"></div>
</div>

<div class="card">
<h3>💸 Koszty projektów</h3>
<select id="costProject"></select>
<input id="costAmount" type="number" placeholder="Kwota">
<button onclick="addCost()">Dodaj koszt</button>
<div id="costs"></div>
</div>

<div class="card">
<h3>📊 Analityka czasu</h3>
<canvas id="timeChart"></canvas>
</div>

<div class="card">
<h3>📈 Analityka kosztów</h3>
<canvas id="costChart"></canvas>
</div>

<div class="card">
<h3>🧮 Podsumowanie</h3>
<div id="summary"></div>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("ERP_PROPLUS")) || {
projects:[],workers:[],materials:[],costs:[],time:[],active:null
};

const save=()=>localStorage.setItem("ERP_PROPLUS",JSON.stringify(db));
const uid=()=>crypto.randomUUID();

/* ----- DODAWANIE ----- */
function addProject(){db.projects.push({id:uid(),name:pName.value});pName.value="";save();render();}
function addWorker(){db.workers.push({id:uid(),name:wName.value,rate:+wRate.value});wName.value=wRate.value="";save();render();}
function addMaterial(){db.materials.push({id:uid(),name:mName.value,qty:+mQty.value,cost:+mCost.value});mName.value=mQty.value=mCost.value="";save();render();}
function addCost(){db.costs.push({id:uid(),project:costProject.value,amount:+costAmount.value});costAmount.value="";save();render();}

/* ----- CZAS PRACY ----- */
function startWork(){
if(db.active) return alert("Ktoś już pracuje!");
db.active={
worker:timeWorker.value,
project:timeProject.value,
start:Date.now()
};
save();
}

function stopWork(){
if(!db.active) return;
let end=Date.now();
let hours=(end-db.active.start)/3600000;
db.time.push({...db.active,hours});
db.active=null;
save();render();
}

/* ----- RENDER ----- */
function render(){
projects.innerHTML=workers.innerHTML=materials.innerHTML=costs.innerHTML=timeLog.innerHTML=summary.innerHTML="";
timeWorker.innerHTML=timeProject.innerHTML=costProject.innerHTML="";

db.projects.forEach(p=>{
projects.innerHTML+=`<div class="row">${p.name}</div>`;
timeProject.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
costProject.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
});

db.workers.forEach(w=>{
workers.innerHTML+=`<div class="row">${w.name} ${w.rate} zł/h</div>`;
timeWorker.innerHTML+=`<option value="${w.id}">${w.name}</option>`;
});

db.materials.forEach(m=>{
materials.innerHTML+=`<div class="row ${m.qty<5?'low':''}">${m.name} – ${m.qty} szt</div>`;
});

db.costs.forEach(c=>{
let p=db.projects.find(x=>x.id===c.project);
costs.innerHTML+=`<div class="row">${p?.name}: ${c.amount} zł</div>`;
});

db.time.forEach(t=>{
let w=db.workers.find(x=>x.id===t.worker);
let p=db.projects.find(x=>x.id===t.project);
timeLog.innerHTML+=`<div class="row">${w?.name} → ${p?.name}: ${t.hours.toFixed(2)} h</div>`;
});

/* PODSUMOWANIE */
db.projects.forEach(p=>{
let labor=db.time.filter(t=>t.project===p.id)
.reduce((s,t)=>s+t.hours*(db.workers.find(w=>w.id===t.worker)?.rate||0),0);
let spent=db.costs.filter(c=>c.project===p.id).reduce((s,c)=>s+c.amount,0);
summary.innerHTML+=`<div class="row">${p.name}: robocizna ${labor.toFixed(0)} zł | koszty ${spent} zł</div>`;
});

drawCharts();
}

/* ----- WYKRESY ----- */
function drawCharts(){
draw(costChart, db.projects.map(p=>db.costs.filter(c=>c.project===p.id).reduce((s,c)=>s+c.amount,0)));
draw(timeChart, db.projects.map(p=>db.time.filter(t=>t.project===p.id).reduce((s,t)=>s+t.hours,0)));
}

function draw(canvas, values){
let ctx=canvas.getContext("2d");
ctx.clearRect(0,0,400,200);
let max=Math.max(...values,1);
let w=300/values.length;
values.forEach((v,i)=>{
let h=(v/max)*160;
ctx.fillStyle="#5fa38c";
ctx.fillRect(i*w+10,180-h,w-8,h);
});
}

render();
</script>
</body>
</html>
