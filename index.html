<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild PRO+ – Calendar 2.0</title>

<style>
body{margin:0;font-family:system-ui;background:#f3f4f6}
header{background:#0f172a;color:white;padding:18px;font-size:22px}
.container{max-width:1200px;margin:auto;padding:16px}

.card{background:white;padding:18px;border-radius:16px;margin:16px 0;
box-shadow:0 6px 16px rgba(0,0,0,.08)}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:12px
}

button{
padding:8px 14px;
border-radius:10px;
border:none;
background:#6faf8e;
color:white;
font-weight:600;
cursor:pointer
}

.calendar{
display:grid;
grid-template-columns:60px repeat(7,1fr);
gap:6px
}

.weekday{
font-weight:700;
text-align:center
}

.week{
text-align:center;
font-weight:600;
color:#555
}

.day{
background:white;
border-radius:12px;
padding:12px;
text-align:center;
cursor:pointer;
border:1px solid #eee
}

.day.today{
background:#dcfce7;
font-weight:700
}

.day.active{
outline:3px solid #6faf8e
}

.day.other{
opacity:.35
}

.empty{background:transparent;border:none}
</style>
</head>

<body>
<header>📅 TimeBuild PRO+ — Calendar 2.0</header>

<div class="container">

<div class="card nav">
<button onclick="prevYear()">⏫ Rok</button>
<button onclick="prevMonth()">◀ Miesiąc</button>

<b id="label"></b>

<button onclick="nextMonth()">Miesiąc ▶</button>
<button onclick="nextYear()">Rok ⏬</button>
</div>

<div class="card">
<div id="calendar" class="calendar"></div>
</div>

</div>

<script>

let current=new Date();
let selected=null;

function pad(n){return String(n).padStart(2,"0")}

function key(d){
return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`
}

const weekdays=["","Pn","Wt","Śr","Cz","Pt","Sb","Nd"];

function getWeekNumber(date){
let d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
let day=d.getUTCDay()||7;
d.setUTCDate(d.getUTCDate()+4-day);
let yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
return Math.ceil((((d-yearStart)/86400000)+1)/7);
}

function buildCalendar(){

const cal=document.getElementById("calendar");
cal.innerHTML="";

document.getElementById("label").textContent=
current.toLocaleDateString("pl-PL",{month:"long",year:"numeric"});

weekdays.forEach(d=>{
cal.innerHTML+=`<div class="weekday">${d}</div>`;
});

let y=current.getFullYear();
let m=current.getMonth();

let first=new Date(y,m,1);
let start=(first.getDay()+6)%7;

let startDate=new Date(y,m,1-start);

for(let w=0;w<6;w++){

let weekDate=new Date(startDate);
weekDate.setDate(startDate.getDate()+w*7);

cal.innerHTML+=`<div class="week">T${getWeekNumber(weekDate)}</div>`;

for(let i=0;i<7;i++){

let d=new Date(weekDate);
d.setDate(weekDate.getDate()+i);

let cls="day";
if(d.getMonth()!==m) cls+=" other";

if(key(d)===key(new Date())) cls+=" today";
if(key(d)===selected) cls+=" active";

cal.innerHTML+=`
<div class="${cls}" onclick="selectDay('${key(d)}')">
${d.getDate()}
</div>`;
}

}

}

function selectDay(k){
selected=k;
buildCalendar();
}

function prevMonth(){
current.setMonth(current.getMonth()-1);
buildCalendar();
}

function nextMonth(){
current.setMonth(current.getMonth()+1);
buildCalendar();
}

function prevYear(){
current.setFullYear(current.getFullYear()-1);
buildCalendar();
}

function nextYear(){
current.setFullYear(current.getFullYear()+1);
buildCalendar();
}

buildCalendar();

</script>
</body>
</html>
