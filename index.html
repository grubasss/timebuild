<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept — TimeBuild Pro</title>

<style>
:root{
--green:#6FAF8E;
--dark:#2F3A3F;
--bg:#F3F6F5;
--card:#ffffff;
--border:#E5E7EB;
}

body{
margin:0;
font-family:system-ui,-apple-system;
background:var(--bg);
}

header{
background:linear-gradient(90deg,var(--green),var(--dark));
color:white;
padding:16px;
display:flex;
align-items:center;
gap:14px;
}

header img{height:44px}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;
margin-bottom:20px;
}

.stat{
background:var(--card);
padding:16px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.stat h4{margin:0;color:#555;font-size:14px}
.stat b{font-size:22px}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:var(--card);
padding:18px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
margin-bottom:20px;
}

.project{
padding:12px 0;
border-bottom:1px solid var(--border);
}

.project:last-child{border:none}

.progress{
height:8px;
background:#ddd;
border-radius:8px;
margin-top:6px;
overflow:hidden;
}

.progress div{
height:100%;
background:var(--green);
}

input,select,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid var(--border);
font-size:15px;
}

button{
background:var(--green);
color:white;
border:none;
font-weight:600;
cursor:pointer;
}

.worker{
border-bottom:1px solid var(--border);
padding:8px 0;
}

.total{
font-weight:700;
margin-top:10px;
font-size:18px;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<b>TimeBuild Pro</b>
</header>

<b id="totalHours">0h</b>
</div>
<div class="stat">

<b id="totalCost">0 zł</b>
</div>
<div class="stat">
<h4>Aktywne projekty</h4>
<b id="projectCount">0</b>
</div>
<div class="stat">
<h4>Pracownicy</h4>
<b>3</b>
</div>
</div>

<div class="grid">

<div>
<div class="card">
<h3>🏗 Projekty</h3>
<input id="newProject" placeholder="Nazwa projektu">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projectList"></div>
</div>
</div>

<div>
<div class="card">
<h3>📅 Dodaj godziny</h3>
<input type="number" id="hours" placeholder="Godziny dla wszystkich">
<select id="projectSelect"></select>
<button onclick="addHours()">Zapisz</button>
</div>
