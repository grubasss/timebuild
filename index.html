<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept — TimeBuild Pro</title>

<style>
:root{
--green:#6FAF8E;
--dark:#2F3A3F;
--bg:#F3F6F5;
--card:#fff;
--border:#E5E7EB;
}

body{margin:0;font-family:system-ui;background:var(--bg)}

header{
background:linear-gradient(90deg,var(--green),var(--dark));
color:white;
padding:16px;
font-weight:600;
}

.container{max-width:1000px;margin:auto;padding:18px}

.card{
background:var(--card);
padding:16px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
margin-bottom:16px;
}

input,select,button{
width:100%;
padding:11px;
margin:6px 0;
border-radius:12px;
border:1px solid var(--border);
}

button{
background:var(--green);
color:white;
border:none;
font-weight:600;
cursor:pointer;
}

.row{display:flex;gap:8px;flex-wrap:wrap}

.item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid var(--border);
}

.small{
background:#dc2626;
padding:4px 8px;
font-size:13px;
border-radius:8px;
}

.worker{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid var(--border);
}

.absent{color:#dc2626;font-weight:600}
.total{font-weight:700;font-size:18px;margin-top:10px}
</style>
</head>

<body>

<header>🏗 House Concept — TimeBuild Pro</header>

<div class="container">

<div class="card">
<h3>👷 Pracownicy</h3>
<input id="newWorker" placeholder="Imię i nazwisko">
<button onclick="addWorker()">Dodaj pracownika</button>
<div id="workerList"></div>
</div>

<div class="card">
<h3>🏗 Projekty / miejsca pracy</h3>
<input id="newProject" placeholder="Nazwa projektu">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projectList"></div>
</div>

<div class="card">
<h3>✅ Wszyscy obecni</h3>
<input type="number" id="bulkHours" placeholder="Godziny dla wszystkich">
<select id="bulkProject"></select>
<button onclick="addBulk()">Dodaj godziny</button>
</div>

<div class="card">
<h3>👤 Indywidualnie</h3>
<select id="workerSelect"></select>
<input type="number" id="singleHours" placeholder="Godziny">
<select id="singleProject"></select>
<button onclick="addSingle()">Dodaj pracownikowi</button>
</div>

<div class="card">
<h3>🚫 Obecność</h3>
<div id="absenceList"></div>
</div>

<div class="card">
<h3>📊 Podsumowanie</h3>
<div id="summary"></div>
<div class="total" id="totalPay"></div>
</div>

</div>

<script>
let workers = JSON.parse(localStorage.getItem("workers")) || [
{name:"Łukasz Nowak",rate:25,hours:0,absent:false},
{name:"Ariel Walczak",rate:25,hours:0,absent:false},
{name:"Daniel Daniel",rate:25,hours:0,absent:false}
];

let projects = JSON.parse(localStorage.getItem("projects")) || ["Dom Wola"];

function save(){
localStorage.setItem("workers",JSON.stringify(workers));
localStorage.setItem("projects",JSON.stringify(projects));
}

function addWorker(){
if(!newWorker.value.trim()) return;
workers.push({name:newWorker.value,rate:25,hours:0,absent:false});
newWorker.value="";
save();render();
}

function removeWorker(i){
workers.splice(i,1);
save();render();
}

function addProject(){
if(!newProject.value.trim()) return;
projects.push(newProject.value);
newProject.value="";
save();render();
}

function removeProject(i){
projects.splice(i,1);
save();render();
}

function addBulk(){
let h=Number(bulkHours.value);
if(!h) return;
workers.forEach(w=>{
 if(!w.absent) w.hours+=h;
});
bulkHours.value="";
save();render();
}

function addSingle(){
let i=workerSelect.value;
let h=Number(singleHours.value);
if(!h) return;
workers[i].hours+=h;
singleHours.value="";
save();render();
}

function toggleAbsent(i){
workers[i].absent=!workers[i].absent;
save();render();
}

function render(){
workerList.innerHTML="";
projectList.innerHTML="";
bulkProject.innerHTML="";
singleProject.innerHTML="";
workerSelect.innerHTML="";
absenceList.innerHTML="";
summary.innerHTML="";
let total=0;

workers.forEach((w,i)=>{
workerList.innerHTML+=`
<div class="item">${w.name}
<button class="small" onclick="removeWorker(${i})">Usuń</button></div>`;

workerSelect.innerHTML+=`<option value="${i}">${w.name}</option>`;

absenceList.innerHTML+=`
<div class="worker">
${w.name}
<button onclick="toggleAbsent(${i})" class="${w.absent?'absent':''}">
${w.absent?"NIEOBECNY":"OBECNY"}
</button></div>`;

let pay=w.hours*25;
total+=pay;

summary.innerHTML+=`
<div class="worker">
<b>${w.name}</b>
<span>${w.hours}h → ${pay} zł</span>
</div>`;
});

projects.forEach((p,i)=>{
projectList.innerHTML+=`
<div class="item">${p}
<button class="small" onclick="removeProject(${i})">Usuń</button></div>`;
bulkProject.innerHTML+=`<option>${p}</option>`;
singleProject.innerHTML+=`<option>${p}</option>`;
});

totalPay.textContent="RAZEM: "+total+" zł";
}

render();
</script>

</body>
</html>
