<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept – TimeBuild Pro</title>

<style>
:root{
--main:#6faf8e;
--dark:#0f172a;
--bg:#f3f4f6;
--card:#ffffff;
--border:#e5e7eb;
}

body{margin:0;font-family:system-ui;background:var(--bg)}
header{background:#0f172a;color:white;padding:18px;font-size:22px;font-weight:600}
.container{max-width:1200px;margin:auto;padding:18px}

.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:10px 16px;background:white;border-radius:14px;cursor:pointer}
.tab.active{background:var(--main);color:white}

.section{display:none}
.section.active{display:block}

.card{
background:var(--card);
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:18px;
}

.calendar,.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.weekdays{text-align:center;font-weight:600}
.day{
background:white;
padding:10px;
border-radius:14px;
text-align:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.06);
}
.day.active{outline:3px solid var(--main)}
.day.today{background:#dcfce7}
.day.weekend{background:#f1f5f9}

button,input,select{
width:100%;
padding:9px;
border-radius:10px;
border:1px solid var(--border);
margin:6px 0;
}

button{background:var(--main);color:white;border:none;font-weight:600}

.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding:6px 0}
.flex{display:flex;gap:8px;flex-wrap:wrap}
.remove{color:red;cursor:pointer}
canvas{width:100%;margin-top:10px}
</style>
</head>

<body>

<header>House Concept — TimeBuild Pro</header>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="showTab('calendarTab')">Kalendarz</div>
<div class="tab" onclick="showTab('workersTab')">Pracownicy</div>
<div class="tab" onclick="showTab('projectsTab')">Projekty</div>
<div class="tab" onclick="showTab('advancesTab')">Zaliczki</div>
<div class="tab" onclick="showTab('reportsTab')">Raporty</div>
</div>

<!-- KALENDARZ -->
<div id="calendarTab" class="section active">

<div class="flex">
<button onclick="prevMonth()">⬅</button>
<b id="monthLabel"></b>
<button onclick="nextMonth()">➡</button>
</div>

<div class="weekdays">
<div>Pn</div><div>Wt</div><div>Śr</div><div>Cz</div><div>Pt</div><div>Sb</div><div>Nd</div>
</div>
<div class="calendar" id="calendar"></div>

<div class="card">
<h3>Dodaj godziny</h3>
<select id="workerSelect"></select>
<select id="projectSelect"></select>
<input id="hoursInput" type="number" placeholder="Godziny">
<button onclick="addEntry()">Dodaj wpis</button>
<div id="dayEntries"></div>
</div>

</div>

<!-- PRACOWNICY -->
<div id="workersTab" class="section">
<div class="card">
<input id="newWorker" placeholder="Imię i nazwisko">
<input id="newRate" type="number" placeholder="Stawka">
<button onclick="addWorker()">Dodaj pracownika</button>
<div id="workerList"></div>
</div>
</div>

<!-- PROJEKTY -->
<div id="projectsTab" class="section">
<div class="card">
<input id="newProject" placeholder="Nazwa projektu">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projectList"></div>
</div>
</div>

<!-- ZALICZKI -->
<div id="advancesTab" class="section">
<div class="card">
<select id="advWorker"></select>
<input id="advAmount" type="number" placeholder="Kwota">
<button onclick="addAdvance()">Dodaj zaliczkę</button>
<div id="advanceHistory"></div>
</div>
</div>

<!-- RAPORTY -->
<div id="reportsTab" class="section">

<div class="card">
<h3>Koszty projektów</h3>
<canvas id="projectChart" height="180"></canvas>
</div>

<div class="card">
<h3>Koszty miesięczne</h3>
<canvas id="monthChart" height="180"></canvas>
</div>

<div class="card">
<h3>Rozliczenia</h3>
<div id="reportList"></div>
</div>

</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("tbProFull"))||{
workers:[
{name:"Łukasz Nowak",rate:25,advances:[]},
{name:"Ariel Walczak",rate:25,advances:[]},
{name:"Daniel Daniel",rate:25,advances:[]}
],
projects:["Dom Wola"],
entries:{}
};

let current=new Date();
let selected=null;

const save=()=>localStorage.setItem("tbProFull",JSON.stringify(db));
const key=d=>d.toISOString().slice(0,10);

function showTab(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
event.target.classList.add("active");
render();
}

function renderCalendar(){
calendar.innerHTML="";
monthLabel.textContent=current.toLocaleString("pl",{month:"long",year:"numeric"});

let first=new Date(current.getFullYear(),current.getMonth(),1);
let start=(first.getDay()+6)%7;
let days=new Date(current.getFullYear(),current.getMonth()+1,0).getDate();
let todayKey=key(new Date());

for(let i=0;i<start;i++)calendar.innerHTML+="<div></div>";

for(let i=1;i<=days;i++){
let d=new Date(current.getFullYear(),current.getMonth(),i);
let k=key(d);
let sum=(db.entries[k]||[]).reduce((a,b)=>a+b.hours,0);

let el=document.createElement("div");
el.className="day"+(selected===k?" active":"")+(k===todayKey?" today":"")+([0,6].includes(d.getDay())?" weekend":"");
el.innerHTML=`${i}<br>${sum||""}`;
el.onclick=()=>{selected=k;render()};
calendar.appendChild(el);
}
}

function addEntry(){
if(!selected||!hoursInput.value) return;
db.entries[selected]=db.entries[selected]||[];
db.entries[selected].push({
worker:+workerSelect.value,
project:projectSelect.value,
hours:+hoursInput.value
});
hoursInput.value="";
save();render();
}

function addWorker(){
db.workers.push({name:newWorker.value,rate:+newRate.value,advances:[]});
newWorker.value="";newRate.value="";
save();render();
}

function addProject(){
db.projects.push(newProject.value);
newProject.value="";
save();render();
}

function addAdvance(){
db.workers[advWorker.value].advances.push({
date:new Date().toISOString(),
amount:+advAmount.value
});
advAmount.value="";
save();render();
}

function removeEntry(i){
db.entries[selected].splice(i,1);
save();render();
}

function removeItem(arr,i){arr.splice(i,1);save();render()}

function prevMonth(){current.setMonth(current.getMonth()-1);selected=null;render()}
function nextMonth(){current.setMonth(current.getMonth()+1);selected=null;render()}

function drawCharts(){
let pctx=projectChart.getContext("2d");
pctx.clearRect(0,0,500,200);

db.projects.forEach((p,i)=>{
let cost=0;
Object.values(db.entries).forEach(d=>d.forEach(e=>{
if(e.project===p) cost+=e.hours*db.workers[e.worker].rate;
}));
pctx.fillStyle="#6faf8e";
pctx.fillRect(i*60,180-cost/5,40,cost/5);
pctx.fillText(p,i*60,195);
});

let mctx=monthChart.getContext("2d");
mctx.clearRect(0,0,500,200);

let map={};
Object.keys(db.entries).forEach(k=>{
let m=k.slice(0,7);
map[m]=map[m]||0;
db.entries[k].forEach(e=>map[m]+=e.hours*db.workers[e.worker].rate);
});

Object.entries(map).forEach(([m,v],i)=>{
mctx.fillStyle="#10b981";
mctx.fillRect(i*60,180-v/5,40,v/5);
mctx.fillText(m,i*60,195);
});
}

function render(){
renderCalendar();
workerSelect.innerHTML="";
projectSelect.innerHTML="";
workerList.innerHTML="";
projectList.innerHTML="";
dayEntries.innerHTML="";
advWorker.innerHTML="";
advanceHistory.innerHTML="";
reportList.innerHTML="";

db.workers.forEach((w,i)=>{
workerSelect.innerHTML+=`<option value="${i}">${w.name}</option>`;
advWorker.innerHTML+=`<option value="${i}">${w.name}</option>`;
workerList.innerHTML+=`
<div class="row">${w.name} (${w.rate} zł/h)
<span class="remove" onclick="removeItem(db.workers,${i})">❌</span>
</div>`;
});

db.projects.forEach((p,i)=>{
projectSelect.innerHTML+=`<option>${p}</option>`;
projectList.innerHTML+=`
<div class="row">${p}
<span class="remove" onclick="removeItem(db.projects,${i})">❌</span>
</div>`;
});

(db.entries[selected]||[]).forEach((e,i)=>{
dayEntries.innerHTML+=`
<div class="row">
${db.workers[e.worker].name} – ${e.project} – ${e.hours}h
<span class="remove" onclick="removeEntry(${i})">❌</span>
</div>`;
});

db.workers.forEach((w,i)=>{
let h=0,c=0;
Object.values(db.entries).forEach(d=>d.forEach(e=>{
if(e.worker===i){h+=e.hours;c+=e.hours*w.rate}
}));
let adv=w.advances.reduce((s,a)=>s+a.amount,0);
reportList.innerHTML+=`${w.name}: ${h}h = ${c-adv} zł<br>`;

w.advances.forEach(a=>{
advanceHistory.innerHTML+=`${w.name} ${a.date.slice(0,10)} – ${a.amount} zł<br>`;
});
});

drawCharts();
}

render();
</script>

</body>
</html>
