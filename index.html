<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TimeBuild Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
--main:#2563eb;
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--soft:#e5e7eb;
}

body{
margin:0;
font-family:system-ui, -apple-system, BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
}

header{
background:var(--main);
color:white;
padding:16px;
font-size:20px;
font-weight:600;
}

.container{
padding:14px;
max-width:800px;
margin:auto;
}

.card{
background:var(--card);
border-radius:14px;
padding:14px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,.06);
}

h3{
margin:0 0 10px 0;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--soft);
margin-bottom:8px;
font-size:15px;
}

button{
width:100%;
background:var(--main);
border:none;
color:white;
padding:12px;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.small{
font-size:13px;
color:#475569;
}

.worker{
padding:8px 0;
border-bottom:1px solid var(--soft);
}

.badge{
display:inline-block;
background:#e0e7ff;
color:#1e3a8a;
padding:4px 10px;
border-radius:20px;
font-size:13px;
margin-top:4px;
}

.total{
font-weight:700;
font-size:17px;
}
</style>
</head>
<body>

<header>ð TimeBuild Pro â House Concept</header>

<div class="container">

<div class="card">
<h3>ð DzieÅ pracy</h3>
<input type="date" id="date">
<input type="number" id="hours" placeholder="Godziny dla wszystkich">
<select id="project">
<option>Dom Wola</option>
<option>Elewacja Piaseczno</option>
<option>Remont Warszawa</option>
</select>
<button onclick="addDay()">Wszyscy obecni</button>
</div>

<div class="card">
<h3>ð Podsumowanie</h3>
<div id="summary"></div>
</div>

</div>

<script>
let workers=[
{name:"Åukasz Nowak",rate:25,hours:0},
{name:"Ariel Walczak",rate:25,hours:0},
{name:"Daniel Daniel",rate:25,hours:0}
];

function addDay(){
let h=Number(hours.value);
workers.forEach(w=>w.hours+=h);
render();
}

function render(){
summary.innerHTML="";
let total=0;
workers.forEach(w=>{
let pay=w.hours*w.rate;
total+=pay;
summary.innerHTML+=`
<div class="worker">
<b>${w.name}</b><br>
<span class="badge">${w.hours} h</span><br>
<span class="small">Do wypÅaty: ${pay} zÅ</span>
</div>`;
});
summary.innerHTML+=`<p class="total">Razem: ${total} zÅ</p>`;
}

render();
</script>

</body>
</html>
