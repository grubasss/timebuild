<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TimeBuild Pro — House Concept</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
--green:#6FAF8E;
--dark:#2F3A3F;
--bg:#F4F7F6;
--card:#FFFFFF;
--soft:#D1D5DB;
}

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont;
background:var(--bg);
}

header{
background:linear-gradient(90deg,var(--green),var(--dark));
color:white;
padding:14px 18px;
display:flex;
align-items:center;
gap:14px;
}

header img{
height:46px;
}

.container{
max-width:950px;
margin:auto;
padding:16px;
}

.card{
background:var(--card);
padding:16px;
border-radius:16px;
margin-bottom:16px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
}

h3{margin:0 0 10px 0}

input,select,button{
width:100%;
padding:11px;
border-radius:12px;
border:1px solid var(--soft);
margin:6px 0;
font-size:15px;
}

button{
background:var(--green);
color:white;
border:none;
font-weight:600;
cursor:pointer;
}

.project{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid var(--soft);
}

.delete{
background:#dc2626;
padding:6px 10px;
font-size:13px;
border-radius:8px;
}

.worker{
border-bottom:1px solid var(--soft);
padding:10px 0;
}

.total{
font-weight:700;
margin-top:10px;
font-size:17px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" alt="House Concept">
<b>TimeBuild Pro</b>
</header>

<div class="container">

<div class="card">
<h3>➕ Projekty</h3>
<input id="newProject" placeholder="Nazwa projektu">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projectList"></div>
</div>

<div class="card">
<h3>📅 Godziny (wszyscy obecni)</h3>
<input type="number" id="hours" placeholder="Godziny dla wszystkich">
<select id="projectSelect"></select>
<button onclick="addHours()">Dodaj godziny</button>
</div>

<div class="card">
<h3>💰 Zaliczka dla wszystkich</h3>
<input type="number" id="advanceAll" placeholder="Kwota">
<button onclick="addAdvanceAll()">Dodaj wszystkim</button>
</div>

<div class="card">
<h3>👤 Zaliczka indywidualna</h3>
<select id="workerSelect"></select>
<input type="number" id="advanceOne" placeholder="Kwota">
<button onclick="addAdvanceOne()">Dodaj osobno</button>
</div>

<div class="card">
<h3>📊 Podsumowanie</h3>
<div id="summary"></div>
</div>

</div>

<script>
let projects = JSON.parse(localStorage.getItem("projects")) || ["Dom Wola"];
let workers = JSON.parse(localStorage.getItem("workers")) || [
 {name:"Łukasz Nowak",rate:25,hours:0,adv:[]},
 {name:"Ariel Walczak",rate:25,hours:0,adv:[]},
 {name:"Daniel Daniel",rate:25,hours:0,adv:[]}
];

function save(){
localStorage.setItem("projects",JSON.stringify(projects));
localStorage.setItem("workers",JSON.stringify(workers));
}

function addProject(){
if(!newProject.value.trim()) return;
projects.push(newProject.value.trim());
newProject.value="";
save();renderProjects();
}

function renderProjects(){
projectSelect.innerHTML="";
projectList.innerHTML="";
projects.forEach((p,i)=>{
projectSelect.innerHTML+=`<option>${p}</option>`;
projectList.innerHTML+=`
<div class="project">
${p}
<button class="delete" onclick="projects.splice(${i},1);save();renderProjects()">Usuń</button>
</div>`;
});
}

function addHours(){
let h=Number(hours.value);
if(!h) return;
workers.forEach(w=>w.hours+=h);
save();render();
}

function addAdvanceAll(){
let a=Number(advanceAll.value);
if(!a) return;
workers.forEach(w=>w.adv.push(a));
advanceAll.value="";
save();render();
}

function addAdvanceOne(){
let i=workerSelect.value;
let a=Number(advanceOne.value);
if(!a) return;
workers[i].adv.push(a);
advanceOne.value="";
save();render();
}

function render(){
summary.innerHTML="";
workerSelect.innerHTML="";
let total=0;

workers.forEach((w,i)=>{
workerSelect.innerHTML+=`<option value="${i}">${w.name}</option>`;
let adv=w.adv.reduce((s,x)=>s+x,0);
let pay=w.hours*w.rate-adv;
total+=pay;

summary.innerHTML+=`
<div class="worker">
<b>${w.name}</b><br>
Godziny: ${w.hours}h<br>
Zaliczki: ${adv} zł<br>
Do wypłaty: <b>${pay} zł</b>
</div>`;
});

summary.innerHTML+=`<div class="total">Razem: ${total} zł</div>`;
}

renderProjects();
render();
</script>

</body>
</html>
