<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept – TimeBuild Pro</title>

<style>
:root{
--green:#6FAF8E;
--dark:#3F4F4F;
--bg:#F4F6F5;
--card:#fff;
--border:#E5E7EB;
}

body{margin:0;font-family:system-ui;background:var(--bg)}
header{
background:linear-gradient(90deg,var(--green),var(--dark));
color:#fff;
padding:14px 22px;
display:flex;
align-items:center;
justify-content:space-between;
}
header img{height:42px}
.container{max-width:1200px;margin:auto;padding:20px}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
margin-bottom:20px;
}
.card,.stat{
background:var(--card);
padding:16px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.06);
}
.stat h4{margin:0;color:#666}
.stat b{font-size:22px}

.grid{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:20px;
}

input,select,button{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
margin-top:8px;
}
button{
background:var(--green);
color:white;
border:none;
font-weight:600;
cursor:pointer;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid var(--border);
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:13px;
cursor:pointer;
}
.on{background:#16a34a;color:#fff}
.off{background:#dc2626;color:#fff}

.total{font-size:18px;font-weight:700;margin-top:10px}
.calendar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" alt="House Concept">
<b>TimeBuild Pro</b>
</header>

<div class="container">

<div class="stats">
<div class="stat"><h4>Godziny łącznie</h4><b id="totalH">0h</b></div>
<div class="stat"><h4>Koszt robocizny</h4><b id="totalC">0 zł</b></div>
<div class="stat"><h4>Projekty</h4><b id="projCount">0</b></div>
<div class="stat"><h4>Pracownicy</h4><b id="workCount">0</b></div>
</div>

<div class="grid">

<div>
<div class="card">
<h3>Projekty</h3>
<input id="newProject" placeholder="Nazwa projektu">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projectList"></div>
</div>

<div class="card">
<h3>Pracownicy</h3>
<input id="newWorker" placeholder="Imię i nazwisko">
<button onclick="addWorker()">Dodaj pracownika</button>
<div id="workerList"></div>
</div>
</div>

<div>
<div class="card">
<div class="calendar">
<button onclick="prevWeek()">⬅</button>
<b id="weekLabel"></b>
<button onclick="nextWeek()">➡</button>
</div>

<input type="number" id="bulkHours" placeholder="Godziny dla wszystkich">
<select id="bulkProject"></select>
<button onclick="addBulk()">Dodaj wszystkim</button>
</div>

<div class="card">
<select id="singleWorker"></select>
<input type="number" id="singleHours" placeholder="Godziny">
<select id="singleProject"></select>
<button onclick="addSingle()">Dodaj indywidualnie</button>
</div>

<div class="card">
<h3>Obecność</h3>
<div id="attendance"></div>
</div>

<div class="card">
<h3>Podsumowanie</h3>
<div id="summary"></div>
<div class="total" id="totalPay"></div>
</div>
</div>

</div>
</div>

<script>
let workers = JSON.parse(localStorage.getItem("workers")) || [];
let projects = JSON.parse(localStorage.getItem("projects")) || [];
let entries = JSON.parse(localStorage.getItem("entries")) || {};

let weekOffset=0;

function save(){
localStorage.setItem("workers",JSON.stringify(workers));
localStorage.setItem("projects",JSON.stringify(projects));
localStorage.setItem("entries",JSON.stringify(entries));
}

function weekKey(){
let d=new Date();
d.setDate(d.getDate()+weekOffset*7);
let y=d.getFullYear();
let w=Math.ceil((((d - new Date(y,0,1)) / 86400000) + new Date(y,0,1).getDay()+1)/7);
return y+"-W"+w;
}

function updateWeek(){
weekLabel.textContent="Tydzień "+weekKey();
render();
}

function prevWeek(){weekOffset--;updateWeek()}
function nextWeek(){weekOffset++;updateWeek()}

function addWorker(){
workers.push({name:newWorker.value,rate:25,absent:false});
newWorker.value="";
save();render();
}

function addProject(){
projects.push(newProject.value);
newProject.value="";
save();render();
}

function addBulk(){
let k=weekKey();
entries[k]=entries[k]||{};
workers.forEach(w=>{
if(!w.absent){
entries[k][w.name]=(entries[k][w.name]||0)+Number(bulkHours.value);
}
});
bulkHours.value="";
save();render();
}

function addSingle(){
let k=weekKey();
let name=workers[singleWorker.value].name;
entries[k]=entries[k]||{};
entries[k][name]=(entries[k][name]||0)+Number(singleHours.value);
singleHours.value="";
save();render();
}

function toggle(i){
workers[i].absent=!workers[i].absent;
save();render();
}

function render(){
projectList.innerHTML="";
workerList.innerHTML="";
attendance.innerHTML="";
summary.innerHTML="";
bulkProject.innerHTML="";
singleProject.innerHTML="";
singleWorker.innerHTML="";

projects.forEach(p=>{
projectList.innerHTML+=`<div class="row">${p}</div>`;
bulkProject.innerHTML+=`<option>${p}</option>`;
singleProject.innerHTML+=`<option>${p}</option>`;
});

let totalH=0,totalC=0;
let k=weekKey();
entries[k]=entries[k]||{};

workers.forEach((w,i)=>{
workerList.innerHTML+=`<div class="row">${w.name}</div>`;
singleWorker.innerHTML+=`<option value="${i}">${w.name}</option>`;

attendance.innerHTML+=`
<div class="row">${w.name}
<span class="badge ${w.absent?'off':'on'}" onclick="toggle(${i})">
${w.absent?'NIE':'TAK'}
</span></div>`;

let h=entries[k][w.name]||0;
let c=h*w.rate;
totalH+=h;
totalC+=c;

summary.innerHTML+=`<div class="row">${w.name}<span>${h}h → ${c} zł</span></div>`;
});

totalH_el.textContent=totalH+"h";
totalC_el.textContent=totalC+" zł";
projCount.textContent=projects.length;
workCount.textContent=workers.length;
totalPay.textContent="RAZEM: "+totalC+" zł";
}

const totalH_el=document.getElementById("totalH");
const totalC_el=document.getElementById("totalC");

updateWeek();
</script>

</body>
</html>
