<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild PRO+ ERP</title>

<style>
body{margin:0;font-family:system-ui;background:#f3f4f6}
header{background:#0f172a;color:white;padding:18px;font-size:22px}
.container{max-width:1400px;margin:auto;padding:16px}
.card{background:white;padding:18px;border-radius:16px;margin:16px 0;
box-shadow:0 6px 16px rgba(0,0,0,.08)}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px
}

.calendar{
display:grid;
grid-template-columns:60px repeat(7,1fr);
gap:6px
}

.week{font-weight:700;text-align:center;color:#666}
.weekday{font-weight:700;text-align:center}

.day{
background:white;
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
border:1px solid #eee
}

.day.today{background:#dcfce7;font-weight:700}
.day.active{outline:3px solid #6faf8e}
.day.other{opacity:.35}

.row{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
padding:6px
}

button,input,select{
padding:8px;
border-radius:10px;
border:1px solid #ddd;
margin:4px;
width:100%
}

button{
background:#6faf8e;
color:white;
border:none;
font-weight:600
}

.flex{display:flex;gap:6px;flex-wrap:wrap}
.small{width:90px}
.remove{color:#dc2626;font-weight:700;cursor:pointer}
.stat{font-size:18px;font-weight:700}
</style>
</head>

<body>
<header>TimeBuild PRO+ ERP</header>
<div class="container">

<div class="card nav">
<button onclick="prevMonth()">◀</button>
<b id="label"></b>
<button onclick="nextMonth()">▶</button>
</div>

<div class="card">
<div id="calendar" class="calendar"></div>
</div>

<div class="card">
<select id="worker"></select>
<select id="project"></select>
<input id="hours" type="number" placeholder="Godziny">
<div class="flex">
<button onclick="addEntry(false)">Jednemu</button>
<button onclick="addEntry(true)">Wszystkim</button>
</div>
<div id="dayList"></div>
<button onclick="deleteDay()" style="background:#dc2626">Usuń dzień</button>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("TBPRO"))||{
workers:[],
projects:[],
entries:{}
};

const save=()=>localStorage.setItem("TBPRO",JSON.stringify(db));

function pad(n){return String(n).padStart(2,"0")}
function key(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}

let current=new Date();
let selected=null;

const weekdays=["","Pn","Wt","Śr","Cz","Pt","Sb","Nd"];

function getWeekNumber(date){
let d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
let day=d.getUTCDay()||7;
d.setUTCDate(d.getUTCDate()+4-day);
let yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
return Math.ceil((((d-yearStart)/86400000)+1)/7);
}

function buildCalendar(){

const cal=document.getElementById("calendar");
cal.innerHTML="";

document.getElementById("label").textContent=
current.toLocaleDateString("pl-PL",{month:"long",year:"numeric"});

weekdays.forEach(d=>{
cal.innerHTML+=`<div class="weekday">${d}</div>`;
});

let y=current.getFullYear();
let m=current.getMonth();

let first=new Date(y,m,1);
let start=(first.getDay()+6)%7;
let startDate=new Date(y,m,1-start);

for(let w=0;w<6;w++){

let weekDate=new Date(startDate);
weekDate.setDate(startDate.getDate()+w*7);

cal.innerHTML+=`<div class="week">T${getWeekNumber(weekDate)}</div>`;

for(let i=0;i<7;i++){

let d=new Date(weekDate);
d.setDate(weekDate.getDate()+i);

let k=key(d);
let sum=(db.entries[k]||[]).reduce((a,b)=>a+b.h,0);

let cls="day";
if(d.getMonth()!==m) cls+=" other";
if(k===key(new Date())) cls+=" today";
if(k===selected) cls+=" active";

cal.innerHTML+=`
<div class="${cls}" onclick="selectDay('${k}')">
${d.getDate()}<br>${sum||""}
</div>`;
}
}
}

function selectDay(k){selected=k;render();}

function prevMonth(){current.setMonth(current.getMonth()-1);buildCalendar();}
function nextMonth(){current.setMonth(current.getMonth()+1);buildCalendar();}

function addEntry(all){
if(!selected||!hours.value) return;
db.entries[selected]=db.entries[selected]||[];

if(all){
db.workers.forEach((_,i)=>{
db.entries[selected].push({w:i,p:project.value,h:+hours.value});
});
}else{
db.entries[selected].push({w:+worker.value,p:project.value,h:+hours.value});
}

hours.value="";
save();
render();
}

function deleteDay(){
delete db.entries[selected];
save();
render();
}

function render(){
buildCalendar();

worker.innerHTML="";
project.innerHTML="";
dayList.innerHTML="";

db.workers.forEach((w,i)=>{
worker.innerHTML+=`<option value="${i}">${w.name}</option>`;
});

db.projects.forEach(p=>{
project.innerHTML+=`<option>${p}</option>`;
});

(db.entries[selected]||[]).forEach((e,i)=>{
dayList.innerHTML+=`
<div class="row">
${db.workers[e.w]?.name} – ${e.p}
<input class="small" value="${e.h}"
onchange="db.entries[selected][${i}].h=+this.value;save();render()">h
<span class="remove"
onclick="db.entries[selected].splice(${i},1);save();render()">✖</span>
</div>`;
});
}

buildCalendar();
render();
</script>
</body>
</html>
