<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild Pro</title>

<style>
:root{
--green:#6faf8e;
--dark:#1f2937;
--bg:#f3f4f6;
--card:#ffffff;
--border:#e5e7eb;
}

body{
margin:0;
font-family:system-ui,-apple-system;
background:var(--bg);
}

header{
background:linear-gradient(90deg,var(--dark),#374151);
color:white;
padding:16px;
font-size:20px;
font-weight:600;
}

.container{
max-width:1100px;
margin:auto;
padding:16px;
}

.calendar,.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.weekdays{
font-weight:600;
text-align:center;
margin-bottom:6px;
}

.day{
background:var(--card);
border-radius:12px;
padding:8px;
text-align:center;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,.06);
font-size:13px;
}

.day.active{outline:2px solid var(--green)}
.day.today{background:#dcfce7;font-weight:700}
.day.weekend{background:#f9fafb}

.card{
background:var(--card);
padding:18px;
border-radius:16px;
margin:16px 0;
box-shadow:0 6px 16px rgba(0,0,0,.08);
}

h3{margin-top:0}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 0;
border-bottom:1px solid var(--border);
}

button,input,select{
padding:8px;
border-radius:10px;
border:1px solid var(--border);
margin:6px 0;
width:100%;
font-size:14px;
}

button{
background:var(--green);
color:white;
border:none;
font-weight:600;
cursor:pointer;
}

.flex{display:flex;gap:8px;flex-wrap:wrap}
.small{width:80px}
canvas{width:100%}
.entry-remove{
color:red;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<header>TimeBuild Pro</header>

<div class="container">

<div class="flex">
<button onclick="prevMonth()">⬅</button>
<b id="monthLabel"></b>
<button onclick="nextMonth()">➡</button>
</div>

<div class="weekdays">
<div>Pn</div><div>Wt</div><div>Śr</div><div>Cz</div><div>Pt</div><div>Sb</div><div>Nd</div>
</div>
<div class="calendar" id="calendar"></div>

<div class="card">
<h3>Dzień pracy</h3>

<select id="project"></select>
<input id="hours" type="number" placeholder="Godziny">

<div id="checks"></div>

<div class="flex">
<button onclick="addAll()">Wszyscy</button>
<button onclick="addSelected()">Wybrani</button>
</div>

<div id="dayEntries"></div>
</div>

<div class="card">
<h3>Zaliczki</h3>
<select id="advWorker"></select>
<input id="advAmount" type="number" placeholder="Kwota">
<button onclick="addAdvance()">Dodaj zaliczkę</button>
</div>

<div class="card">
<h3>Rozliczenie pracowników</h3>
<div id="workerReport"></div>
</div>

</div>

<script>

let db=JSON.parse(localStorage.getItem("tbpro"))||{
workers:[
{name:"Łukasz Nowak",rate:25,advance:0},
{name:"Ariel Walczak",rate:25,advance:0},
{name:"Daniel Daniel",rate:25,advance:0}
],
projects:["Dom Wola"],
entries:{}
};

let current=new Date();
let selected=null;

const save=()=>localStorage.setItem("tbpro",JSON.stringify(db));
const key=d=>d.toISOString().slice(0,10);

function renderCalendar(){
calendar.innerHTML="";
monthLabel.textContent=current.toLocaleString("pl",{month:"long",year:"numeric"});

let first=new Date(current.getFullYear(),current.getMonth(),1);
let start=(first.getDay()+6)%7;
let days=new Date(current.getFullYear(),current.getMonth()+1,0).getDate();
let todayKey=key(new Date());

for(let i=0;i<start;i++)calendar.innerHTML+="<div></div>";

for(let i=1;i<=days;i++){
let d=new Date(current.getFullYear(),current.getMonth(),i);
let k=key(d);
let sum=(db.entries[k]||[]).reduce((a,b)=>a+b.h,0);

let el=document.createElement("div");
el.className="day"+(selected===k?" active":"")+(k===todayKey?" today":"")+([0,6].includes(d.getDay())?" weekend":"");
el.innerHTML=`${i}<br><b>${sum||""}</b>`;
el.onclick=()=>{selected=k;renderAll()};
calendar.appendChild(el);
}
}

function addAll(){
if(!selected||!hours.value) return;
db.entries[selected]=db.entries[selected]||[];
db.workers.forEach((w,i)=>{
db.entries[selected].push({w:i,p:project.value,h:+hours.value});
});
save();renderAll();
}

function addSelected(){
if(!selected||!hours.value) return;
db.entries[selected]=db.entries[selected]||[];
document.querySelectorAll("#checks input:checked").forEach(c=>{
db.entries[selected].push({w:+c.value,p:project.value,h:+hours.value});
});
save();renderAll();
}

function removeEntry(i){
db.entries[selected].splice(i,1);
save();renderAll();
}

function addAdvance(){
if(!advAmount.value) return;
db.workers[advWorker.value].advance+=+advAmount.value;
advAmount.value="";
save();renderAll();
}

function prevMonth(){
current.setMonth(current.getMonth()-1);
selected=null;
renderAll();
}

function nextMonth(){
current.setMonth(current.getMonth()+1);
selected=null;
renderAll();
}

function renderAll(){
renderCalendar();

checks.innerHTML="";
project.innerHTML="";
advWorker.innerHTML="";
dayEntries.innerHTML="";
workerReport.innerHTML="";

db.projects.forEach(p=>{
project.innerHTML+=`<option>${p}</option>`;
});

db.workers.forEach((w,i)=>{
checks.innerHTML+=`<label><input type="checkbox" value="${i}">${w.name}</label>`;
advWorker.innerHTML+=`<option value="${i}">${w.name}</option>`;
});

(db.entries[selected]||[]).forEach((e,i)=>{
dayEntries.innerHTML+=`
<div class="row">
${db.workers[e.w].name} – ${e.h}h (${e.p})
<span class="entry-remove" onclick="removeEntry(${i})">✕</span>
</div>`;
});

db.workers.forEach((w,i)=>{
let h=0;
Object.values(db.entries).forEach(d=>d.forEach(e=>{if(e.w===i)h+=e.h}));
let pay=h*w.rate-w.advance;
workerReport.innerHTML+=`
<div class="card">
<b>${w.name}</b><br>
Godziny: ${h}h<br>
Stawka: ${w.rate} zł<br>
Zaliczki: ${w.advance} zł<br>
<b>Do wypłaty: ${pay} zł</b>
</div>`;
});
}

renderAll();
</script>

</body>
</html>
