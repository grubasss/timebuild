<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild Pro</title>

<style>
body{margin:0;font-family:system-ui;background:#f4f7f6}
header{background:#2f4f4f;color:white;padding:14px;display:flex;gap:10px;align-items:center}
header img{height:40px}
.container{max-width:1050px;margin:auto;padding:14px}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.day{background:white;border-radius:8px;padding:6px;text-align:center;font-size:12px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.day.active{outline:2px solid #6faf8e}

.card{background:white;padding:14px;border-radius:14px;margin-bottom:14px;box-shadow:0 6px 16px rgba(0,0,0,.06)}

.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:6px 0}
input,select,button{padding:8px;border-radius:8px;border:1px solid #ddd;width:100%;margin:4px 0}
button{background:#6faf8e;color:white;border:none;font-weight:600}

.small{width:70px}
.flex{display:flex;gap:6px}
</style>
</head>

<body>

<header>
<img src="logo.png">
<b>TimeBuild Pro</b>
</header>

<div class="container">

<div class="calendar" id="calendar"></div>

<div class="card">
<h3>Dzień roboczy</h3>
<select id="worker"></select>
<select id="project"></select>
<input type="number" id="hours" placeholder="Godziny">
<div class="flex">
<button onclick="addEntry()">➕ Dodaj</button>
<button onclick="removeLast()">➖ Cofnij</button>
</div>
<div id="dayList"></div>
</div>

<div class="card">
<h3>Pracownicy – godziny i stawki</h3>
<div id="workers"></div>
</div>

<div class="card">
<h3>Projekty</h3>
<input id="newProject" placeholder="Nazwa projektu">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projects"></div>
</div>

<div class="card">
<h3>Zaliczki</h3>
<select id="advWorker"></select>
<input type="number" id="advAmount" placeholder="Kwota">
<button onclick="addAdvance()">Dodaj zaliczkę</button>
</div>

<div class="card">
<h3>Podsumowanie</h3>
<div id="summary"></div>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("tbpro"))||{
workers:[
{name:"Łukasz Nowak",rate:25,adv:0},
{name:"Ariel Walczak",rate:25,adv:0},
{name:"Daniel Daniel",rate:25,adv:0}
],
projects:["Dom Wola"],
entries:{}
};

let current=new Date();
let selected=null;

const save=()=>localStorage.setItem("tbpro",JSON.stringify(db));
const key=d=>d.toISOString().slice(0,10);

function renderCalendar(){
calendar.innerHTML="";
let days=new Date(current.getFullYear(),current.getMonth()+1,0).getDate();
for(let i=1;i<=days;i++){
let d=new Date(current.getFullYear(),current.getMonth(),i);
let k=key(d);
let sum=(db.entries[k]||[]).reduce((a,b)=>a+b.h,0);
let el=document.createElement("div");
el.className="day"+(selected===k?" active":"");
el.innerHTML=`${i}<br>${sum}h`;
el.onclick=()=>{selected=k;renderAll()};
calendar.appendChild(el);
}
}

function addEntry(){
if(!selected||!hours.value) return;
db.entries[selected]=db.entries[selected]||[];
db.entries[selected].push({w:+worker.value,p:project.value,h:+hours.value});
hours.value="";
save();renderAll();
}

function removeLast(){
if(!db.entries[selected]?.length) return;
db.entries[selected].pop();
save();renderAll();
}

function addProject(){
if(!newProject.value) return;
db.projects.push(newProject.value);
newProject.value="";
save();renderAll();
}

function addAdvance(){
db.workers[advWorker.value].adv+=+advAmount.value;
advAmount.value="";
save();renderAll();
}

function renderAll(){
renderCalendar();

workers.innerHTML="";
projects.innerHTML="";
summary.innerHTML="";
worker.innerHTML="";
project.innerHTML="";
advWorker.innerHTML="";

db.workers.forEach((w,i)=>{
let hoursSum=0;
Object.values(db.entries).forEach(day=>{
day.forEach(e=>{if(e.w===i)hoursSum+=e.h});
});

workers.innerHTML+=`
<div class="row">
<input value="${w.name}" onchange="db.workers[${i}].name=this.value;save()">
<div class="flex">
<button onclick="db.workers[${i}].rate++;save();renderAll()">➕</button>
<button onclick="db.workers[${i}].rate--;save();renderAll()">➖</button>
<input class="small" type="number" value="${w.rate}" onchange="db.workers[${i}].rate=this.value;save();renderAll()">
</div>
<div class="flex">
<button onclick="db.entries[Object.keys(db.entries)[0]]&&0"> </button>
</div>
<span>${hoursSum}h</span>
</div>`;

worker.innerHTML+=`<option value="${i}">${w.name}</option>`;
advWorker.innerHTML+=`<option value="${i}">${w.name}</option>`;

let pay=hoursSum*w.rate-w.adv;
summary.innerHTML+=`<div class="row">${w.name}: ${hoursSum}h → ${pay} zł</div>`;
});

db.projects.forEach((p,i)=>{
projects.innerHTML+=`
<div class="row">${p}
<button onclick="db.projects.splice(${i},1);save();renderAll()">❌</button>
</div>`;
project.innerHTML+=`<option>${p}</option>`;
});
}

renderAll();
</script>

</body>
</html>
