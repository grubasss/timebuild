<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild Pro</title>

<style>
body{margin:0;font-family:system-ui;background:#f3f4f6}
header{background:#0f172a;color:white;padding:18px;font-size:22px}
.container{max-width:1200px;margin:auto;padding:16px}
.card{background:white;padding:18px;border-radius:16px;margin:16px 0;box-shadow:0 6px 16px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{background:white;padding:10px;border-radius:12px;text-align:center;cursor:pointer}
.day.active{outline:3px solid #6faf8e}
.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:6px 0}
button,input,select{padding:8px;border-radius:10px;border:1px solid #ddd;margin:4px;width:100%}
button{background:#6faf8e;color:white;border:none;font-weight:600}
.flex{display:flex;gap:6px;flex-wrap:wrap}
.remove{color:red;cursor:pointer}
canvas{width:100%;height:200px}
.small{width:80px}
</style>
</head>

<body>
<header>TimeBuild Pro — profesjonalny system</header>
<div class="container">

<div class="card">
<b>Kalendarz</b>
<div id="calendar" class="grid"></div>
</div>

<div class="card">
<select id="worker"></select>
<select id="project"></select>
<input id="hours" type="number" placeholder="Godziny">
<div class="flex">
<button onclick="addOne()">Pojedynczo</button>
<button onclick="addAll()">Wszyscy</button>
</div>
<div id="dayList"></div>
<button onclick="deleteDay()" style="background:#dc2626">Usuń dzień</button>
</div>

<div class="card">
<b>Pracownicy</b>
<input id="newWorker" placeholder="Imię">
<input id="newRate" type="number" placeholder="Stawka">
<button onclick="addWorker()">Dodaj</button>
<div id="workers"></div>
</div>

<div class="card">
<b>Projekty</b>
<input id="newProject" placeholder="Projekt">
<button onclick="addProject()">Dodaj</button>
<div id="projects"></div>
</div>

<div class="card">
<b>Zaliczki</b>
<select id="advWorker"></select>
<input id="advAmount" type="number" placeholder="Kwota">
<button onclick="addAdvance()">Dodaj zaliczkę</button>
<div id="advHistory"></div>
</div>

<div class="card">
<b>Koszty pracowników</b>
<canvas id="workerChart"></canvas>
</div>

<div class="card">
<b>Koszty projektów</b>
<canvas id="projectChart"></canvas>
</div>

<div class="card">
<b>Rozliczenia tygodniowe / miesięczne</b>
<div id="summary"></div>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("tbPro"))||{
workers:[
{name:"Łukasz",rate:25,adv:[]},
{name:"Ariel",rate:25,adv:[]},
{name:"Daniel",rate:25,adv:[]}
],
projects:["Dom Wola"],
entries:{}
};

let selected=null;
const save=()=>localStorage.setItem("tbPro",JSON.stringify(db));
const key=d=>d.toISOString().slice(0,10);

function renderCalendar(){
calendar.innerHTML="";
let days=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
for(let i=1;i<=days;i++){
let d=new Date();d.setDate(i);
let k=key(d);
let sum=(db.entries[k]||[]).reduce((a,b)=>a+b.h,0);
let el=document.createElement("div");
el.className="day"+(selected===k?" active":"");
el.innerHTML=i+"<br>"+sum;
el.onclick=()=>{selected=k;render()};
calendar.appendChild(el);
}
}

function addOne(){
if(!selected||!hours.value) return;
db.entries[selected]=db.entries[selected]||[];
db.entries[selected].push({w:+worker.value,p:project.value,h:+hours.value});
hours.value="";
save();render();
}

function addAll(){
db.entries[selected]=db.entries[selected]||[];
db.workers.forEach((_,i)=>{
db.entries[selected].push({w:i,p:project.value,h:+hours.value});
});
hours.value="";
save();render();
}

function deleteDay(){delete db.entries[selected];save();render()}

function addWorker(){
db.workers.push({name:newWorker.value,rate:+newRate.value,adv:[]});
newWorker.value="";newRate.value="";
save();render();
}

function addProject(){
db.projects.push(newProject.value);
newProject.value="";
save();render();
}

function addAdvance(){
db.workers[advWorker.value].adv.push({
date:new Date().toISOString(),
amount:+advAmount.value
});
advAmount.value="";
save();render();
}

function draw(canvas,data){
let c=document.getElementById(canvas);
let ctx=c.getContext("2d");
c.width=c.offsetWidth;c.height=200;
ctx.clearRect(0,0,c.width,c.height);
let max=Math.max(...data.map(d=>d.val),1);
let w=c.width/data.length;
data.forEach((d,i)=>{
let h=d.val/max*(c.height-20);
ctx.fillStyle="#6faf8e";
ctx.fillRect(i*w+10,c.height-h,40,h);
ctx.fillText(d.label,i*w+10,c.height-4);
});
}

function render(){
renderCalendar();
worker.innerHTML="";
project.innerHTML="";
advWorker.innerHTML="";
workers.innerHTML="";
projects.innerHTML="";
dayList.innerHTML="";
advHistory.innerHTML="";
summary.innerHTML="";

db.workers.forEach((w,i)=>{
worker.innerHTML+=`<option value="${i}">${w.name}</option>`;
advWorker.innerHTML+=`<option value="${i}">${w.name}</option>`;
workers.innerHTML+=`
<div class="row">
${w.name} (${w.rate} zł)
<span class="remove" onclick="db.workers.splice(${i},1);save();render()">❌</span>
</div>`;
});

db.projects.forEach((p,i)=>{
project.innerHTML+=`<option>${p}</option>`;
projects.innerHTML+=`
<div class="row">${p}
<span class="remove" onclick="db.projects.splice(${i},1);save();render()">❌</span>
</div>`;
});

(db.entries[selected]||[]).forEach((e,i)=>{
dayList.innerHTML+=`
<div class="row">
${db.workers[e.w].name} – ${e.p}
<input class="small" value="${e.h}" onchange="db.entries[selected][${i}].h=+this.value;save();render()">h
<span class="remove" onclick="db.entries[selected].splice(${i},1);save();render()">❌</span>
</div>`;
});

let workerCost=[];
let projectCost={};
db.projects.forEach(p=>projectCost[p]=0);

db.workers.forEach((w,i)=>{
let sum=0;
Object.values(db.entries).forEach(d=>d.forEach(e=>{
if(e.w===i){sum+=e.h*w.rate;projectCost[e.p]+=e.h*w.rate}
}));
let adv=w.adv.reduce((s,a)=>s+a.amount,0);
summary.innerHTML+=`${w.name}: ${sum-adv} zł (zaliczki ${adv})<br>`;
workerCost.push({label:w.name,val:sum});
w.adv.forEach(a=>{
let d=new Date(a.date).toLocaleString("pl-PL");
advHistory.innerHTML+=`${w.name} — ${d} — ${a.amount} zł<br>`;
});
});

draw("workerChart",workerCost);

draw("projectChart",Object.entries(projectCost).map(p=>({label:p[0],val:p[1]})));
}

render();
</script>
</body>
</html>
