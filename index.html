<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TimeBuild Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
--main:#2563eb;
--bg:#f1f5f9;
--card:#ffffff;
--soft:#e5e7eb;
}

body{margin:0;font-family:system-ui;background:var(--bg)}

header{background:var(--main);color:#fff;padding:14px;font-size:18px;font-weight:600}

.container{max-width:900px;margin:auto;padding:14px}

.card{background:#fff;padding:14px;border-radius:14px;margin-bottom:14px;box-shadow:0 6px 16px rgba(0,0,0,.06)}

input,select,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid var(--soft)
}

button{
background:var(--main);
color:#fff;
border:none;
font-size:16px;
font-weight:600
}

.row{display:flex;gap:10px;flex-wrap:wrap}

.worker{border-bottom:1px solid var(--soft);padding:8px 0}

.total{font-weight:700;margin-top:8px}
</style>
</head>
<body>

<header>🏗 TimeBuild Pro — House Concept</header>

<div class="container">

<div class="card">
<h3>Dzień pracy</h3>
<input type="date" id="date">
<input type="number" id="hours" placeholder="Godziny dla wszystkich">
<select id="project">
<option>Dom Wola</option>
<option>Elewacja Piaseczno</option>
<option>Remont Warszawa</option>
</select>
<button onclick="addDay()">Wszyscy obecni</button>
</div>

<div class="card">
<h3>Podsumowanie</h3>
<div id="summary"></div>
</div>

</div>

<script>
let workers = JSON.parse(localStorage.getItem("workers")) || [
 {name:"Łukasz Nowak", rate:25, hours:0},
 {name:"Ariel Walczak", rate:25, hours:0},
 {name:"Daniel Daniel", rate:25, hours:0}
];

function save(){
 localStorage.setItem("workers", JSON.stringify(workers));
}

function addDay(){
 let h = Number(hours.value);
 if(!h) return;

 workers.forEach(w => w.hours += h);
 save();
 render();
}

function render(){
 summary.innerHTML="";
 let total = 0;

 workers.forEach(w=>{
   let pay = w.hours * w.rate;
   total += pay;
   summary.innerHTML += `
    <div class="worker">
      <b>${w.name}</b><br>
      Godziny: ${w.hours}h<br>
      Do wypłaty: ${pay} zł
    </div>`;
 });

 summary.innerHTML += `<div class="total">Razem: ${total} zł</div>`;
}

render();
</script>

</body>
</html>
