<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>House Concept — TimeBuild Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
--green:#6FAF8E;
--dark:#2F3A3F;
--bg:#F4F7F6;
--card:#FFFFFF;
--soft:#E5E7EB;
}

body{
margin:0;
font-family:system-ui,-apple-system;
background:var(--bg);
}

header{
background:linear-gradient(90deg,var(--green),var(--dark));
color:white;
padding:14px 18px;
display:flex;
align-items:center;
gap:12px;
}

header img{
height:42px;
}

.container{
max-width:1000px;
margin:auto;
padding:16px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:14px;
margin-bottom:18px;
}

.stat-card{
background:var(--card);
padding:14px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.stat-card h4{
margin:0;
font-size:14px;
color:#555;
}

.stat-card b{
font-size:20px;
}

.card{
background:var(--card);
padding:16px;
border-radius:16px;
margin-bottom:16px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
}

h3{margin-top:0}

input,select,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid var(--soft);
font-size:15px;
}

button{
background:var(--green);
color:white;
border:none;
font-weight:600;
}

.project{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid var(--soft);
}

.worker{
border-bottom:1px solid var(--soft);
padding:8px 0;
}

.total{
font-weight:700;
margin-top:8px;
font-size:18px;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<b>TimeBuild Pro</b>
</header>

<div class="container">

<div class="stats">
<div class="stat-card">
<h4>Godziny</h4>
<b id="totalHours">0h</b>
</div>
<div class="stat-card">
<h4>Koszt robocizny</h4>
<b id="totalCost">0 zł</b>
</div>
<div class="stat-card">
<h4>Projekty</h4>
<b id="projectCount">0</b>
</div>
</div>

<div class="card">
<h3>📁 Projekty</h3>
<input id="newProject" placeholder="Nazwa projektu">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projectList"></div>
</div>

<div class="card">
<h3>📅 Godziny</h3>
<input type="number" id="hours" placeholder="Godziny dla wszystkich">
<select id="projectSelect"></select>
<button onclick="addHours()">Dodaj godziny</button>
</div>

<div class="card">
<h3>💰 Zaliczki (wszyscy)</h3>
<input type="number" id="advanceAll" placeholder="Kwota">
<button onclick="addAdvanceAll()">Dodaj wszystkim</button>
</div>

<div class="card">
<h3>📊 Podsumowanie</h3>
<div id="summary"></div>
</div>

</div>

<script>
let projects = JSON.parse(localStorage.getItem("projects")) || ["Dom Wola"];
let workers = JSON.parse(localStorage.getItem("workers")) || [
{name:"Łukasz Nowak",rate:25,hours:0,adv:0},
{name:"Ariel Walczak",rate:25,hours:0,adv:0},
{name:"Daniel Daniel",rate:25,hours:0,adv:0}
];

function save(){
localStorage.setItem("projects",JSON.stringify(projects));
localStorage.setItem("workers",JSON.stringify(workers));
}

function addProject(){
if(!newProject.value) return;
projects.push(newProject.value);
newProject.value="";
save();
render();
}

function addHours(){
let h=Number(hours.value);
if(!h) return;
workers.forEach(w=>w.hours+=h);
save();
render();
}

function addAdvanceAll(){
let a=Number(advanceAll.value);
if(!a) return;
workers.forEach(w=>w.adv+=a);
advanceAll.value="";
save();
render();
}

function render(){
projectSelect.innerHTML="";
projectList.innerHTML="";
summary.innerHTML="";
let totalH=0;
let totalC=0;

projects.forEach(p=>{
projectSelect.innerHTML+=`<option>${p}</option>`;
projectList.innerHTML+=`<div class="project">${p}</div>`;
});

workers.forEach(w=>{
let pay=w.hours*w.rate-w.adv;
totalH+=w.hours;
totalC+=pay;
summary.innerHTML+=`
<div class="worker">
<b>${w.name}</b><br>
Godziny: ${w.hours}h<br>
Zaliczki: ${w.adv} zł<br>
Do wypłaty: <b>${pay} zł</b>
</div>`;
});

totalHours.textContent=totalH+"h";
totalCost.textContent=totalC+" zł";
projectCount.textContent=projects.length;
}

render();
</script>

</body>
</html>
