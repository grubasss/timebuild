<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild Pro</title>

<style>
body{margin:0;font-family:system-ui;background:#f4f6f5}
header{background:#2f4f4f;color:white;padding:12px;text-align:center}
.container{max-width:1100px;margin:auto;padding:14px}

.calendar-header,.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
}

.calendar-header div{
text-align:center;
font-weight:600;
font-size:13px;
}

.day{
background:white;
border-radius:10px;
padding:6px;
min-height:60px;
cursor:pointer;
font-size:12px;
box-shadow:0 3px 8px rgba(0,0,0,.05);
}

.day.active{outline:2px solid #6faf8e}

.card{
background:white;
padding:14px;
border-radius:14px;
margin-top:12px
}

input,select,button{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
font-size:14px
}

button{
background:#6faf8e;
color:white;
border:none;
font-weight:600
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 0;
border-bottom:1px solid #eee
}

.small{width:70px}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px
}

.total-box{
background:#e9f5ef;
padding:10px;
border-radius:10px;
margin-top:10px;
font-weight:600
}
</style>
</head>

<body>

<header>TimeBuild Pro</header>

<div class="container">

<div class="nav">
<button onclick="prevMonth()">⬅</button>
<h3 id="monthLabel"></h3>
<button onclick="nextMonth()">➡</button>
</div>

<div class="calendar-header">
<div>Pn</div><div>Wt</div><div>Śr</div>
<div>Cz</div><div>Pt</div><div>Sb</div><div>Nd</div>
</div>

<div class="calendar" id="calendar"></div>

<div class="card">
<h3>Wpis dnia</h3>
<select id="worker"></select>
<select id="project"></select>
<input type="number" id="hours" placeholder="Godziny">
<button onclick="addEntry()">Dodaj</button>
<div id="dayList"></div>
</div>

<div class="card">
<h3>Pracownicy</h3>
<input id="newWorker" placeholder="Imię i nazwisko">
<input id="newRate" type="number" placeholder="Stawka zł/h">
<button onclick="addWorker()">Dodaj</button>
<div id="workerManage"></div>
</div>

<div class="card">
<h3>Zaliczki</h3>
<select id="advanceWorker"></select>
<input type="number" id="advanceAmount" placeholder="Kwota zaliczki">
<button onclick="addAdvance()">Dodaj zaliczkę</button>
</div>

<div class="card">
<h3>Podsumowanie miesiąca</h3>
<div id="summary"></div>
<div class="total-box" id="totalHours"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("tb")) || {
workers:[],
projects:["Dom Wola"],
entries:{},
advances:{}
};

let current=new Date();
let selected=null;

const dayNames=["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];

function save(){localStorage.setItem("tb",JSON.stringify(data))}
function key(d){return d.toISOString().slice(0,10)}

function renderCalendar(){
calendar.innerHTML="";
monthLabel.textContent=current.toLocaleString("pl",{month:"long",year:"numeric"});

let first=new Date(current.getFullYear(),current.getMonth(),1);
let start=(first.getDay()+6)%7;
let daysInMonth=new Date(current.getFullYear(),current.getMonth()+1,0).getDate();

for(let i=0;i<start;i++)calendar.innerHTML+="<div></div>";

for(let d=1;d<=daysInMonth;d++){
let date=new Date(current.getFullYear(),current.getMonth(),d);
let k=key(date);
let sum=(data.entries[k]||[]).reduce((a,b)=>a+b.h,0);

let el=document.createElement("div");
el.className="day"+(selected===k?" active":"");
el.innerHTML=`<b>${d}</b><br>${dayNames[(date.getDay()+6)%7]}<br>${sum}h`;
el.onclick=()=>{selected=k;renderCalendar();renderDay()};
calendar.appendChild(el);
}
}

function renderDay(){
dayList.innerHTML="";
(data.entries[selected]||[]).forEach((e,i)=>{
dayList.innerHTML+=`
<div class="row">${data.workers[e.w].name} – ${e.h}h
<button onclick="removeEntry(${i})">❌</button></div>`;
});
}

function addEntry(){
if(!selected||!hours.value)return;
data.entries[selected]=data.entries[selected]||[];
data.entries[selected].push({w:+worker.value,h:+hours.value});
hours.value="";
save();renderAll();
}

function removeEntry(i){
data.entries[selected].splice(i,1);
save();renderAll();
}

function addWorker(){
if(!newWorker.value||!newRate.value)return;
data.workers.push({name:newWorker.value,rate:+newRate.value});
newWorker.value="";newRate.value="";
save();renderAll();
}

function addAdvance(){
let i=advanceWorker.value;
data.advances[i]=(data.advances[i]||0)+(+advanceAmount.value);
advanceAmount.value="";
save();renderAll();
}

function renderManage(){
workerManage.innerHTML="";
data.workers.forEach((w,i)=>{
workerManage.innerHTML+=`
<div class="row">${w.name}
<input class="small" type="number" value="${w.rate}" onchange="data.workers[${i}].rate=this.value;save();renderSummary()">
<button onclick="data.workers.splice(${i},1);save();renderAll()">❌</button></div>`;
});
}

function renderSelectors(){
worker.innerHTML="";
advanceWorker.innerHTML="";
data.workers.forEach((w,i)=>{
worker.innerHTML+=`<option value="${i}">${w.name}</option>`;
advanceWorker.innerHTML+=`<option value="${i}">${w.name}</option>`;
});
}

function renderSummary(){
summary.innerHTML="";
let totalH=0;

data.workers.forEach((w,i)=>{
let hoursSum=0;
Object.values(data.entries).forEach(day=>{
day.forEach(e=>{
if(e.w==i)hoursSum+=e.h;
});
});
let payout=hoursSum*w.rate-(data.advances[i]||0);
totalH+=hoursSum;
summary.innerHTML+=`
<div class="row">${w.name} – ${hoursSum}h – ${payout} zł</div>`;
});
totalHours.textContent="Łączna liczba godzin w miesiącu: "+totalH+"h";
}

function renderAll(){
renderCalendar();
renderDay();
renderManage();
renderSelectors();
renderSummary();
}

function prevMonth(){current.setMonth(current.getMonth()-1);renderCalendar()}
function nextMonth(){current.setMonth(current.getMonth()+1);renderCalendar()}

renderAll();
</script>

</body>
</html>
