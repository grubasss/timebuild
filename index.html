<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept ERP COMPLETE+ PRO</title>

<style>
:root{
--main:#5fa38c;--bg:#f3f7f6;--card:#fff;--soft:#eaf5f1;
--text:#1f2933;--danger:#dc2626;--weekend:#fde2e2;
}
.dark{--bg:#0f172a;--card:#1e293b;--soft:#24324a;--text:#e5e7eb}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
header{display:flex;align-items:center;gap:12px;
background:linear-gradient(135deg,#0f172a,#1e293b);color:white;padding:14px}
.logo{height:42px;background:white;padding:6px;border-radius:12px}
.container{max-width:1200px;margin:auto;padding:16px}
.card{background:var(--card);padding:16px;border-radius:18px;margin:14px 0;
box-shadow:0 8px 22px rgba(0,0,0,.12)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{background:var(--soft);border-radius:14px;padding:8px;text-align:center;
font-weight:700;cursor:pointer}
.day.today{outline:3px solid #22c55e}
.day.active{outline:3px solid var(--main)}
.dot{width:7px;height:7px;background:var(--main);
border-radius:50%;margin:4px auto 0}
button,input,select,textarea{
padding:8px;border-radius:10px;border:1px solid #ccc;margin:4px;width:100%}
button{background:var(--main);color:white;font-weight:700;border:none}
.row{display:flex;justify-content:space-between;
align-items:center;border-bottom:1px solid var(--soft);padding:6px 0}
.small{width:90px}
.remove{color:var(--danger);font-weight:800;cursor:pointer}
canvas{max-width:100%}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<b>House Concept ERP COMPLETE+ PRO</b>
<button onclick="toggleDark()">🌙</button>
</header>

<div class="container">

<div class="card">
<b>Statystyki</b>
<div>Zarobione: <span id="earnedStat">0</span> zł</div>
<div>Zaliczki: <span id="advanceStat">0</span> zł</div>
<div><b>Do wypłaty: <span id="toPayStat">0</span> zł</b></div>
</div>

<div class="card">
<div style="display:flex;justify-content:space-between">
<button onclick="moveMonth(-1)">◀</button>
<b id="monthLabel"></b>
<button onclick="moveMonth(1)">▶</button>
</div>
<div id="calendar" class="grid"></div>
</div>

<div class="card">
<h3>🔍 Wyszukaj pracownika</h3>
<input id="searchWorker" oninput="render()" placeholder="Imię">
</div>

<div class="card">
<h3>👷 Pracownicy</h3>
<input id="wName" placeholder="Imię">
<input id="wRate" type="number" placeholder="Stawka">
<button onclick="addWorker()">Dodaj</button>
<div id="workers"></div>
</div>

<div class="card">
<h3>🏗 Projekty</h3>
<input id="pName" placeholder="Projekt">
<button onclick="addProject()">Dodaj</button>
<div id="projects"></div>
</div>

<div class="card">
<h3>⏱ Godziny</h3>
<select id="entryWorker"></select>
<select id="entryProject"></select>
<input id="entryHours" type="number">
<button onclick="addEntry()">Dodaj</button>
<div id="entries"></div>
</div>

<div class="card">
<h3>💰 Zaliczki</h3>
<select id="advWorker"></select>
<input id="advAmount" type="number">
<button onclick="addAdvance()">Dodaj</button>
<div id="advances"></div>
</div>

<div class="card">
<h3>📦 Materiały</h3>
<input id="mName" placeholder="Materiał">
<input id="mQty" type="number" placeholder="Ilość">
<input id="mPrice" type="number" placeholder="Cena">
<button onclick="addMaterial()">Dodaj</button>
<div id="materials"></div>
</div>

<div class="card">
<h3>📝 Notatnik</h3>
<textarea id="note"></textarea>
<button onclick="addNote()">Dodaj</button>
<div id="notes"></div>
</div>

<div class="card">
<h3>📊 Wykres godzin</h3>
<canvas id="hoursChart"></canvas>
</div>

<div class="card">
<h3>💾 Backup</h3>
<button onclick="manualBackup()">Eksport</button>
<input type="file" onchange="restore(this)">
</div>

</div>

<script>
function toggleDark(){document.body.classList.toggle("dark")}

let db=JSON.parse(localStorage.getItem("ERP_PRO"))||{
workers:[
{id:"1",name:"Łukasz",rate:25},
{id:"2",name:"Komuna",rate:25},
{id:"3",name:"Daniel",rate:25}
],
projects:[
{id:"p1",name:"Hala"},
{id:"p2",name:"Elewacja Łagów"}
],
entries:[
{id:"e1",date:"2026-02-20",worker:"1",project:"p1",hours:60},
{id:"e2",date:"2026-02-20",worker:"2",project:"p1",hours:58},
{id:"e3",date:"2026-02-20",worker:"3",project:"p1",hours:48},
{id:"e4",date:"2026-02-20",worker:"3",project:"p2",hours:7.5}
],
advances:[
{id:"a1",worker:"1",date:"2026-02-25",amount:500},
{id:"a2",worker:"1",date:"2026-02-25",amount:140},
{id:"a3",worker:"1",date:"2026-02-25",amount:100},
{id:"a4",worker:"2",date:"2026-02-25",amount:100},
{id:"a5",worker:"2",date:"2026-02-25",amount:100},
{id:"a6",worker:"3",date:"2026-02-25",amount:1350}
],
materials:[],
notes:[]
};

function save(){localStorage.setItem("ERP_PRO",JSON.stringify(db))}

function addWorker(){
db.workers.push({id:crypto.randomUUID(),name:wName.value,rate:+wRate.value})
wName.value=wRate.value=""
save();render()
}

function addProject(){
db.projects.push({id:crypto.randomUUID(),name:pName.value})
pName.value=""
save();render()
}

function addEntry(){
if(!selected)return
db.entries.push({
id:crypto.randomUUID(),
date:selected,
worker:entryWorker.value,
project:entryProject.value,
hours:+entryHours.value
})
entryHours.value=""
save();render()
}

function addAdvance(){
db.advances.push({
id:crypto.randomUUID(),
worker:advWorker.value,
date:new Date().toISOString().slice(0,10),
amount:+advAmount.value
})
advAmount.value=""
save();render()
}

function addMaterial(){
db.materials.push({
id:crypto.randomUUID(),
name:mName.value,
qty:+mQty.value,
price:+mPrice.value
})
mName.value=mQty.value=mPrice.value=""
save();render()
}

function addNote(){
db.notes.push(note.value)
note.value=""
save();render()
}

function manualBackup(){
const w=window.open()
w.document.write("<pre>"+JSON.stringify(db,null,2)+"</pre>")
}

function restore(input){
const r=new FileReader()
r.onload=e=>{db=JSON.parse(e.target.result);save();render()}
r.readAsText(input.files[0])
}

let cur=new Date(),selected=null
function moveMonth(n){cur.setMonth(cur.getMonth()+n);render()}

function buildCalendar(){
calendar.innerHTML=""
monthLabel.textContent=cur.toLocaleDateString("pl",{month:"long",year:"numeric"})
let days=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate()
for(let i=1;i<=days;i++){
let d=new Date(cur.getFullYear(),cur.getMonth(),i)
let k=d.toISOString().slice(0,10)
calendar.innerHTML+=`
<div class="day ${k===selected?'active':''}"
onclick="selected='${k}';render()">
${i}
${db.entries.some(e=>e.date===k)?'<div class="dot"></div>':''}
</div>`
}
}

function render(){
buildCalendar()

let earned=0,adv=0

workers.innerHTML=""
projects.innerHTML=""
entries.innerHTML=""
advances.innerHTML=""
materials.innerHTML=""
notes.innerHTML=""
entryWorker.innerHTML=""
entryProject.innerHTML=""
advWorker.innerHTML=""

let search=searchWorker.value?.toLowerCase()||""

db.workers.forEach(w=>{
if(search && !w.name.toLowerCase().includes(search)) return

workers.innerHTML+=`
<div class="row">
<input value="${w.name}" oninput="w.name=this.value;save()">
<input class="small" value="${w.rate}" oninput="w.rate=+this.value;save()">
</div>`

entryWorker.innerHTML+=`<option value="${w.id}">${w.name}</option>`
advWorker.innerHTML+=`<option value="${w.id}">${w.name}</option>`
})

db.projects.forEach(p=>{
projects.innerHTML+=`
<div class="row">
<input value="${p.name}" oninput="p.name=this.value;save()">
</div>`
entryProject.innerHTML+=`<option value="${p.id}">${p.name}</option>`
})

db.entries.forEach(e=>{
let w=db.workers.find(x=>x.id===e.worker)
earned+=e.hours*w.rate
if(e.date===selected)
entries.innerHTML+=`${w.name}: ${e.hours}h<br>`
})

db.advances.forEach(a=>{
adv+=a.amount
advances.innerHTML+=`${db.workers.find(w=>w.id===a.worker)?.name}: ${a.amount} zł<br>`
})

db.materials.forEach(m=>{
materials.innerHTML+=`${m.name}: ${m.qty*m.price} zł<br>`
})

db.notes.forEach(n=>notes.innerHTML+=n+"<br>")

earnedStat.textContent=earned.toFixed(2)
advanceStat.textContent=adv.toFixed(2)
toPayStat.textContent=(earned-adv).toFixed(2)

drawChart()
}

function drawChart(){
let ctx=document.getElementById("hoursChart")
if(!ctx) return
let hours=db.entries.reduce((s,e)=>s+e.hours,0)
ctx.height=100
let c=ctx.getContext("2d")
c.clearRect(0,0,ctx.width,ctx.height)
c.fillStyle="#5fa38c"
c.fillRect(10,10,hours*2,30)
c.fillStyle="#000"
c.fillText("Godziny: "+hours,10,60)
}

render()
</script>
</body>
</html>
