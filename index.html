<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept ERP COMPLETE+ PRO</title>

<style>
:root{
--main:#5fa38c;--bg:#f3f7f6;--card:#fff;--soft:#eaf5f1;
--text:#1f2933;--danger:#dc2626;--weekend:#fde2e2;
}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
header{display:flex;align-items:center;gap:12px;
background:#0f172a;color:white;padding:14px}
.logo{height:42px;background:white;padding:6px;border-radius:12px}
.container{max-width:1100px;margin:auto;padding:16px}
.card{background:var(--card);padding:16px;border-radius:18px;margin:14px 0}
button,input,select{padding:8px;border-radius:10px;border:1px solid #ccc;margin:4px;width:100%}
button{background:var(--main);color:white;font-weight:700;border:none}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<b>House Concept ERP COMPLETE+ PRO</b>
</header>

<div class="container">

<div class="card" id="stats"></div>

<div class="card">
<h3>👷 Pracownicy</h3>
<div id="workers"></div>
</div>

<div class="card">
<h3>💰 Zaliczki</h3>
<div id="advances"></div>
</div>

<div class="card">
<h3>📊 Projekty</h3>
<div id="projects"></div>
</div>

<script>
const db={
workers:[
{id:"1",name:"Łukasz",rate:25},
{id:"2",name:"Komuna",rate:25},
{id:"3",name:"Daniel",rate:25}
],
projects:[
{id:"p1",name:"Hala"},
{id:"p2",name:"Elewacja Łagów"}
],
hours:[
{worker:"1",project:"p1",hours:60},
{worker:"2",project:"p1",hours:58},
{worker:"3",project:"p1",hours:48},
{worker:"3",project:"p2",hours:7.5}
],
advances:[
{worker:"1",amount:500},
{worker:"1",amount:140},
{worker:"1",amount:100},
{worker:"2",amount:100},
{worker:"2",amount:100},
{worker:"3",amount:1350}
]
};

let earned=0,adv=0;

db.workers.forEach(w=>{
earned+=db.hours
.filter(h=>h.worker===w.id)
.reduce((s,h)=>s+h.hours*w.rate,0);

adv+=db.advances
.filter(a=>a.worker===w.id)
.reduce((s,a)=>s+a.amount,0);
});

stats.innerHTML=`
<b>Zarobione:</b> ${earned} zł<br>
<b>Zaliczki:</b> ${adv} zł<br>
<b>Do wypłaty:</b> ${earned-adv} zł
`;

workers.innerHTML=db.workers.map(w=>
`${w.name} – ${w.rate} zł/h`
).join("<br>");

advances.innerHTML=db.advances.map(a=>
`${db.workers.find(w=>w.id===a.worker).name}: ${a.amount} zł`
).join("<br>");

projects.innerHTML=db.projects.map(p=>{
let cost=db.hours
.filter(h=>h.project===p.id)
.reduce((s,h)=>s+h.hours*25,0);
return `${p.name}: ${cost} zł`;
}).join("<br>");
</script>
</body>
</html>
