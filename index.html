<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeBuild ERP 5.2</title>

<style>
body{margin:0;font-family:system-ui;background:#f3f4f6}
header{background:#0f172a;color:white;padding:16px;font-size:22px}
.container{max-width:1300px;margin:auto;padding:16px}
.card{background:white;padding:16px;border-radius:14px;margin:14px 0;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.weekday{text-align:center;font-weight:700}
.day{background:white;border-radius:12px;padding:10px;text-align:center;cursor:pointer}
.day.today{background:#dcfce7;font-weight:700}
.day.active{outline:3px solid #6faf8e}
.day.empty{background:transparent}
.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:6px}
button,input,select{padding:8px;border-radius:10px;border:1px solid #ddd;width:100%;margin:4px}
button{background:#6faf8e;color:white;border:none;font-weight:600}
.small{width:90px}
.remove{color:#dc2626;font-weight:700;cursor:pointer}
.stat{font-size:18px;font-weight:700}
.flex{display:flex;gap:6px;flex-wrap:wrap}
</style>
</head>

<body>
<header>TimeBuild ERP 5.2</header>
<div class="container">

<div class="card flex">
<div>Dziś: <span id="today">0</span> zł</div>
<div>Tydzień: <span id="week">0</span> zł</div>
<div>Miesiąc: <span id="month">0</span> zł</div>
<div>Do wypłaty: <span id="pay">0</span> zł</div>
</div>

<div class="card">
<div id="weekdays" class="grid"></div>
<div id="calendar" class="grid"></div>
</div>

<div class="card">
<select id="workerSel"></select>
<select id="projectSel"></select>
<input id="hours" type="number" placeholder="Godziny">

<div class="flex">
<button onclick="addEntry(false)">Jednemu</button>
<button onclick="addEntry(true)">Wszystkim</button>
</div>

<div id="dayEntries"></div>
</div>

<div class="card">
<h3>👷 Pracownicy</h3>
<input id="wName" placeholder="Imię">
<input id="wRate" type="number" placeholder="Stawka">
<button onclick="addWorker()">Dodaj</button>
<div id="workers"></div>
</div>

<div class="card">
<h3>📁 Projekty</h3>
<input id="pName" placeholder="Projekt">
<button onclick="addProject()">Dodaj</button>
<div id="projects"></div>
</div>

<div class="card">
<h3>💸 Zaliczki</h3>
<select id="advWorker"></select>
<input id="advAmount" type="number" placeholder="Kwota">
<button onclick="addAdvance()">Dodaj</button>
<div id="advList"></div>
</div>

<div class="card">
<h3>📊 Rozliczenia</h3>
<div id="reports"></div>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("ERP52")) || {
 workers:[],
 projects:[],
 entries:[],
 advances:[]
};

const save=()=>localStorage.setItem("ERP52",JSON.stringify(db));
const uid=()=>crypto.randomUUID();

const days=["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];
weekdays.innerHTML=days.map(d=>`<div class="weekday">${d}</div>`).join("");

let selected=null;

const key=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

function buildCalendar(){
calendar.innerHTML="";
let now=new Date(),y=now.getFullYear(),m=now.getMonth();
let first=new Date(y,m,1);
let start=(first.getDay()+6)%7;
let daysInMonth=new Date(y,m+1,0).getDate();
let today=key(new Date());

for(let i=0;i<start;i++) calendar.innerHTML+=`<div class="day empty"></div>`;

for(let i=1;i<=daysInMonth;i++){
let d=new Date(y,m,i),k=key(d);
let sum=db.entries.filter(e=>e.date===k)
.reduce((s,e)=>s+e.hours*rate(e.worker),0);

calendar.innerHTML+=`
<div class="day ${k===today?'today':''} ${k===selected?'active':''}"
onclick="selectDay('${k}')">${i}<br>${sum||''}</div>`;
}
}

const rate=id=>db.workers.find(w=>w.id===id)?.rate||0;
function selectDay(k){selected=k;render();}

function addWorker(){
db.workers.push({id:uid(),name:wName.value,rate:+wRate.value});
wName.value='';wRate.value='';
save();render();
}

function addProject(){
db.projects.push({id:uid(),name:pName.value});
pName.value='';
save();render();
}

function addEntry(all){
if(!selected||!hours.value) return;

if(all){
db.workers.forEach(w=>db.entries.push({
id:uid(),date:selected,worker:w.id,project:projectSel.value,hours:+hours.value
}));
}else{
db.entries.push({
id:uid(),date:selected,worker:workerSel.value,project:projectSel.value,hours:+hours.value
});
}
hours.value='';
save();render();
}

function addAdvance(){
db.advances.push({
id:uid(),
worker:advWorker.value,
date:key(new Date()),
amount:+advAmount.value
});
advAmount.value='';
save();render();
}

function render(){
buildCalendar();

workerSel.innerHTML='';
projectSel.innerHTML='';
advWorker.innerHTML='';
workers.innerHTML='';
projects.innerHTML='';
dayEntries.innerHTML='';
advList.innerHTML='';
reports.innerHTML='';

db.workers.forEach(w=>{
workerSel.innerHTML+=`<option value="${w.id}">${w.name}</option>`;
advWorker.innerHTML+=`<option value="${w.id}">${w.name}</option>`;

workers.innerHTML+=`
<div class="row">
<input value="${w.name}" oninput="w.name=this.value;save()">
<input class="small" value="${w.rate}" oninput="w.rate=+this.value;save()">
<span class="remove" onclick="db.workers=db.workers.filter(x=>x.id!=='${w.id}');save();render()">✖</span>
</div>`;
});

db.projects.forEach(p=>{
projectSel.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
projects.innerHTML+=`
<div class="row">
<input value="${p.name}" oninput="p.name=this.value;save()">
<span class="remove" onclick="db.projects=db.projects.filter(x=>x.id!=='${p.id}');save();render()">✖</span>
</div>`;
});

db.entries.filter(e=>e.date===selected).forEach(e=>{
let w=db.workers.find(x=>x.id===e.worker);
let p=db.projects.find(x=>x.id===e.project);

dayEntries.innerHTML+=`
<div class="row">
${w?.name} – ${p?.name}
<input class="small" value="${e.hours}" oninput="e.hours=+this.value;save();render()">
<span class="remove" onclick="db.entries=db.entries.filter(x=>x.id!=='${e.id}');save();render()">✖</span>
</div>`;
});

db.advances.forEach(a=>{
let w=db.workers.find(x=>x.id===a.worker);
advList.innerHTML+=`
<div class="row">
${w?.name} ${a.date}
<input class="small" value="${a.amount}" oninput="a.amount=+this.value;save();render()">
<span class="remove" onclick="db.advances=db.advances.filter(x=>x.id!=='${a.id}');save();render()">✖</span>
</div>`;
});

let today=key(new Date());
let weekStart=new Date();weekStart.setDate(weekStart.getDate()-((weekStart.getDay()+6)%7));
let month=today.slice(0,7);

let t=0,wk=0,m=0,pay=0;

db.entries.forEach(e=>{
let cost=e.hours*rate(e.worker);
if(e.date===today) t+=cost;
if(new Date(e.date)>=weekStart) wk+=cost;
if(e.date.startsWith(month)) m+=cost;
});

db.workers.forEach(w=>{
let earned=db.entries.filter(e=>e.worker===w.id)
.reduce((s,e)=>s+e.hours*w.rate,0);
let adv=db.advances.filter(a=>a.worker===w.id)
.reduce((s,a)=>s+a.amount,0);
pay+=earned-adv;

reports.innerHTML+=`<div class="row">${w.name}: ${earned-adv} zł (zaliczki ${adv})</div>`;
});

today.textContent=t;
week.textContent=wk;
month.textContent=m;
pay.textContent=pay;
}

render();
</script>
</body>
</html>
