<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Concept – TimeBuild Pro</title>

<style>
body{margin:0;font-family:system-ui;background:#f4f6f5}
header{background:#2f4f4f;color:white;padding:14px;font-size:18px;text-align:center}
.container{max-width:1100px;margin:auto;padding:14px}
.grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
.card{background:white;padding:14px;border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.06)}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{background:#e9f0ee;border-radius:10px;padding:8px;text-align:center;cursor:pointer}
.day.active{background:#6faf8e;color:white}
input,select,button{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-top:6px}
button{background:#6faf8e;color:white;border:none;font-weight:600}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee}
.total{font-weight:700;font-size:18px;margin-top:10px}
@media(max-width:850px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<header>🏡 House Concept — TimeBuild Pro</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Kalendarz</h3>
<div class="calendar" id="calendar"></div>
</div>

<div class="card">
<h3>Wpis godzin</h3>

<select id="worker"></select>
<select id="project"></select>
<input type="number" id="hours" placeholder="Godziny">

<button onclick="addEntry()">Dodaj</button>
<button onclick="deleteDay()" style="background:#c0392b">Usuń dzień</button>

<h4>Dzień:</h4>
<div id="dayList"></div>
</div>

</div>

<div class="card">
<h3>Rozliczenie miesiąca</h3>
<div id="workerSummary"></div>
<div class="total" id="totalCost"></div>
</div>

<div class="card">
<h3>Koszt projektów</h3>
<div id="projectSummary"></div>
</div>

</div>

<script>
const data = JSON.parse(localStorage.getItem("timebuild")) || {
workers:[
{name:"Łukasz Nowak",rate:25},
{name:"Ariel Walczak",rate:25},
{name:"Daniel Daniel",rate:25}
],
projects:["Dom Wola","Elewacja Centrum"],
entries:{}
};

let current = new Date();
let selectedDate = null;

function save(){localStorage.setItem("timebuild",JSON.stringify(data));}

function dateKey(d){return d.toISOString().slice(0,10);}

function renderCalendar(){
calendar.innerHTML="";
const days=new Date(current.getFullYear(),current.getMonth()+1,0).getDate();

for(let i=1;i<=days;i++){
const d=new Date(current.getFullYear(),current.getMonth(),i);
const k=dateKey(d);
const hours=(data.entries[k]||[]).reduce((s,e)=>s+e.h,0);

const el=document.createElement("div");
el.className="day"+(selectedDate===k?" active":"");
el.innerHTML=`<b>${i}</b><br>${hours}h`;
el.onclick=()=>selectDay(k);
calendar.appendChild(el);
}
}

function selectDay(k){
selectedDate=k;
renderCalendar();
renderDay();
}

function renderDay(){
dayList.innerHTML="";
(data.entries[selectedDate]||[]).forEach((e,i)=>{
const w=data.workers[e.w].name;
dayList.innerHTML+=`
<div class="row">${w} – ${e.h}h (${e.p})
<button onclick="removeEntry(${i})">❌</button></div>`;
});
}

function addEntry(){
if(!selectedDate) return;
data.entries[selectedDate]=data.entries[selectedDate]||[];
data.entries[selectedDate].push({
w:+worker.value,
p:project.value,
h:+hours.value
});
hours.value="";
save();
renderCalendar();
renderDay();
renderReports();
}

function removeEntry(i){
data.entries[selectedDate].splice(i,1);
save();
renderDay();
renderCalendar();
renderReports();
}

function deleteDay(){
delete data.entries[selectedDate];
save();
renderCalendar();
renderDay();
renderReports();
}

function renderReports(){
workerSummary.innerHTML="";
projectSummary.innerHTML="";
let workerTotals={},projectTotals={},total=0;

Object.entries(data.entries).forEach(([date,arr])=>{
arr.forEach(e=>{
const cost=e.h*data.workers[e.w].rate;
workerTotals[data.workers[e.w].name]=(workerTotals[data.workers[e.w].name]||0)+cost;
projectTotals[e.p]=(projectTotals[e.p]||0)+cost;
total+=cost;
});
});

Object.entries(workerTotals).forEach(([n,v])=>{
workerSummary.innerHTML+=`<div class="row">${n}<b>${v} zł</b></div>`;
});
totalCost.textContent="RAZEM: "+total+" zł";

Object.entries(projectTotals).forEach(([p,v])=>{
projectSummary.innerHTML+=`<div class="row">${p}<b>${v} zł</b></div>`;
});
}

function init(){
worker.innerHTML="";
project.innerHTML="";
data.workers.forEach((w,i)=>worker.innerHTML+=`<option value="${i}">${w.name}</option>`);
data.projects.forEach(p=>project.innerHTML+=`<option>${p}</option>`);
renderCalendar();
renderReports();
}

init();
</script>
</body>
</html>
